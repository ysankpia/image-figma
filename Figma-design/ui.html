<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Image Generator</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7fb;
        --panel: #ffffff;
        --ink: #20232a;
        --muted: #8a8f9c;
        --line: #e7e8ef;
        --line-strong: #d8d9e3;
        --accent: #111318;
        --accent-soft: #f1f2f4;
        --accent-weak: #5b606a;
        --tile: #d9d9d9;
        --danger: #b34231;
        --shadow: 0 8px 22px rgba(30, 35, 55, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        min-width: 320px;
        min-height: 72px;
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 12px;
      }

      button,
      textarea,
      input,
      select {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .shell {
        display: grid;
        grid-template-rows: 52px 1fr;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: var(--panel);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 22px;
        border-bottom: 1px solid var(--line);
      }

      .brand {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 18px;
        font-weight: 760;
        letter-spacing: 0;
      }

      .brand span:last-child {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .topbar-actions {
        display: flex;
        flex: 0 0 auto;
        align-items: center;
        gap: 8px;
      }

      .window-toggle {
        display: grid;
        place-items: center;
        width: 32px;
        height: 32px;
        border-radius: 9px;
        color: #5b606a;
        background: #f4f5f7;
        font-size: 18px;
        font-weight: 850;
      }

      .window-toggle:hover {
        color: #111318;
        background: #eceef3;
      }

      .window-resizer {
        position: fixed;
        right: 6px;
        bottom: 6px;
        z-index: 80;
        width: 18px;
        height: 18px;
        border-radius: 5px;
        cursor: nwse-resize;
        background:
          linear-gradient(135deg, transparent 0 44%, #b7bcc7 45% 50%, transparent 51%),
          linear-gradient(135deg, transparent 0 62%, #b7bcc7 63% 68%, transparent 69%);
        opacity: 0.72;
      }

      .window-resizer:hover {
        opacity: 1;
      }

      .brand-mark {
        position: relative;
        width: 16px;
        height: 16px;
      }

      .brand-mark::before,
      .brand-mark::after {
        position: absolute;
        content: "";
        inset: 4px;
        border-radius: 3px;
        background: var(--accent);
        transform: rotate(45deg);
      }

      .brand-mark::after {
        inset: 8px 0 8px 0;
        background: var(--accent-weak);
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(300px, 348px) minmax(360px, 1fr);
        min-height: 0;
        height: 100%;
        overflow: hidden;
      }

      .sidebar {
        position: relative;
        min-height: 0;
        overflow: hidden;
        border-right: 1px solid var(--line);
        background: #ffffff;
      }

      .sidebar::after {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        height: 92px;
        content: "";
        pointer-events: none;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0), #ffffff 42%);
        z-index: 2;
      }

      .tabs {
        position: relative;
        z-index: 5;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0;
        margin: 14px 22px 0;
        padding: 6px;
        border-radius: 16px;
        background: #f0f0f2;
      }

      .tab {
        height: 42px;
        border-radius: 12px;
        color: #6b707a;
        background: transparent;
        font-size: 14px;
        font-weight: 800;
      }

      .tab.active {
        color: #111318;
        background: #ffffff;
        box-shadow: 0 6px 18px rgba(20, 24, 36, 0.08);
      }

      .controls {
        position: relative;
        z-index: 5;
        display: flex;
        flex-direction: column;
        gap: 13px;
        max-height: 100%;
        overflow-y: auto;
        padding: 16px 22px 106px;
      }

      .sidebar.image-mode .controls {
        gap: 10px;
        padding-top: 14px;
      }

      .section {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .section.hidden {
        display: none;
      }

      .section-title {
        color: #333741;
        font-size: 12px;
        font-weight: 780;
      }

      .prompt-box {
        position: relative;
      }

      .prompt-box.with-reference {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-height: 236px;
        border: 1px solid var(--line-strong);
        border-radius: 14px;
        background: #ffffff;
        box-shadow: inset 0 1px 0 rgba(0, 0, 0, 0.02);
      }

      .sidebar.image-mode .prompt-box.with-reference {
        min-height: 210px;
      }

      .sidebar.image-mode.custom-mode .prompt-box.with-reference {
        min-height: 196px;
      }

      textarea {
        width: 100%;
        height: 178px;
        resize: none;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        padding: 11px 12px 28px;
        color: #555b66;
        background: #ffffff;
        line-height: 1.5;
        box-shadow: inset 0 1px 0 rgba(0, 0, 0, 0.02);
        outline: none;
      }

      textarea:focus {
        outline: none;
        box-shadow: none;
      }

      .prompt-box.with-reference textarea {
        order: 2;
        height: 156px;
        border: 0;
        border-radius: 0;
        padding: 10px 16px 32px;
        color: #555b66;
        background: transparent;
        font-size: 15px;
        font-weight: 720;
        box-shadow: none;
      }

      .sidebar.image-mode .prompt-box.with-reference textarea {
        height: 126px;
        font-size: 14px;
      }

      .sidebar.image-mode.custom-mode .prompt-box.with-reference textarea {
        height: 112px;
      }

      .prompt-box.with-reference textarea::placeholder {
        color: #9aa0ab;
        opacity: 1;
      }

      .reference-strip {
        display: block;
        position: relative;
        padding: 0 10px 10px;
        z-index: 2;
      }

      .prompt-box.with-reference .reference-strip {
        order: 1;
        padding: 10px 12px 0;
      }

      .reference-strip.hidden {
        display: none;
      }

      .reference-drop {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 6px;
        min-height: 44px;
        border: 1px dashed #cfd3dc;
        border-radius: 12px;
        padding: 6px;
        color: #6d7280;
        background: #f8f9fb;
        font-weight: 760;
        cursor: pointer;
      }

      .reference-drop.empty {
        display: none;
      }

      .prompt-box.with-reference .reference-drop {
        width: 100%;
        min-height: 42px;
        border-color: #d7dbe3;
        border-radius: 12px;
        color: #6d7280;
        background: #f8f9fb;
      }

      .reference-drop.has-image {
        display: inline-flex;
        width: 228px;
        min-height: 0;
        border: 0;
        padding: 0;
        background: transparent;
        box-shadow: none;
      }

      .prompt-box.with-reference .reference-drop.has-image {
        width: 228px;
        min-height: 0;
        border: 0;
        border-radius: 0;
        padding: 0;
        background: transparent;
        box-shadow: none;
      }

      .reference-drop input {
        display: none;
      }

      .reference-empty {
        display: flex;
        flex-direction: column;
        gap: 1px;
        min-width: 0;
        padding: 2px 4px;
      }

      .reference-empty strong {
        color: #333741;
        font-size: 11px;
        font-weight: 820;
      }

      .prompt-box.with-reference .reference-empty strong {
        color: #333741;
      }

      .reference-empty span {
        color: #8f95a2;
        font-size: 9px;
        font-weight: 680;
      }

      .prompt-box.with-reference .reference-empty span {
        color: #8f95a2;
      }

      .reference-chips {
        display: none;
        flex-wrap: wrap;
        align-content: flex-start;
        gap: 4px;
        width: 228px;
        max-height: 44px;
        overflow: hidden;
        transition: none;
      }

      .reference-drop.has-image .reference-empty {
        display: none;
      }

      .reference-drop.has-image .reference-chips {
        display: flex;
      }

      .reference-popover {
        position: absolute;
        top: calc(100% + 6px);
        left: 12px;
        display: none;
        width: 248px;
        max-height: 164px;
        padding: 10px;
        border: 1px solid #e1e4eb;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 18px 34px rgba(20, 24, 36, 0.16);
        backdrop-filter: blur(10px);
        z-index: 8;
      }

      .reference-strip.has-overflow:hover .reference-popover,
      .reference-strip.has-overflow:focus-within .reference-popover {
        display: block;
      }

      .reference-popover-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        max-height: 142px;
        overflow-y: auto;
        padding-right: 2px;
      }

      .reference-popover .reference-chip {
        max-width: 106px;
      }

      .reference-chip.more {
        justify-content: center;
        color: #505766;
        font-size: 10px;
        font-weight: 780;
        background: #f5f7fb;
      }

      .reference-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        min-width: 0;
        max-width: 112px;
        height: 20px;
        padding: 2px 4px 2px 2px;
        border: 1px solid #e1e4eb;
        border-radius: 999px;
        background: #ffffff;
        box-shadow: 0 3px 8px rgba(20, 24, 36, 0.05);
      }

      .reference-preview {
        width: 16px;
        height: 16px;
        flex: 0 0 16px;
        object-fit: cover;
        border-radius: 999px;
        background: #eceef3;
      }

      .reference-info {
        min-width: 0;
        flex: 1;
      }

      .reference-info strong {
        display: block;
        overflow: hidden;
        color: #252933;
        font-size: 9px;
        font-weight: 780;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .reference-clear {
        display: grid;
        place-items: center;
        width: 14px;
        height: 14px;
        flex: 0 0 14px;
        border-radius: 999px;
        color: #6b707a;
        background: #f1f2f4;
        font-size: 11px;
        line-height: 1;
      }

      .reference-actions {
        display: none;
      }

      .char-count {
        position: absolute;
        right: 12px;
        bottom: 8px;
        color: #b2b5bd;
        font-size: 11px;
        font-weight: 650;
      }

      .prompt-box.with-reference .char-count {
        color: #b2b5bd;
      }

      .ratio-grid,
      .count-grid {
        display: grid;
        gap: 7px;
      }

      .ratio-grid {
        grid-template-columns: repeat(6, 1fr);
      }

      .count-grid {
        grid-template-columns: repeat(4, 1fr);
      }

      .choice {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        min-width: 0;
        padding: 0;
        background: transparent;
      }

      .choice-main {
        display: grid;
        place-items: center;
        width: 100%;
        min-height: 31px;
        border: 1px solid var(--line);
        border-radius: 6px;
        color: #4e5663;
        background: #ffffff;
        font-weight: 760;
      }

      .sidebar.image-mode.custom-mode .choice-main {
        min-height: 28px;
      }

      .choice.active .choice-main {
        border-color: var(--accent-weak);
        color: var(--accent);
        background: #fcfbff;
        box-shadow: inset 0 0 0 1px rgba(17, 19, 24, 0.18);
      }

      .choice-label {
        max-width: 100%;
        overflow: hidden;
        color: #8f95a2;
        font-size: 10px;
        font-weight: 650;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .size-card {
        display: flex;
        flex-direction: column;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 11px 12px;
        background: #ffffff;
      }

      .sidebar.image-mode.custom-mode .size-card {
        gap: 6px;
        padding: 8px 10px;
      }

      .size-card.hidden {
        display: none;
      }

      .size-title {
        font-size: 12px;
        font-weight: 760;
      }

      .sidebar.image-mode.custom-mode .size-title {
        font-size: 11px;
      }

      .size-row {
        display: grid;
        grid-template-columns: 1fr 18px 1fr 62px;
        gap: 7px;
        align-items: end;
      }

      .size-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .size-field label {
        color: #8f95a2;
        font-size: 10px;
        font-weight: 700;
      }

      .size-field input,
      select {
        width: 100%;
        height: 30px;
        border: 1px solid var(--line);
        border-radius: 7px;
        padding: 0 9px;
        color: #4f5664;
        background: #ffffff;
        font-weight: 650;
      }

      .sidebar.image-mode.custom-mode .size-field input,
      .sidebar.image-mode.custom-mode select {
        height: 28px;
      }

      .link-icon {
        display: grid;
        place-items: center;
        height: 30px;
        color: #8f95a2;
        font-weight: 760;
      }

      .hint {
        color: #a1a6b0;
        font-size: 10px;
        font-weight: 650;
      }

      .sidebar.image-mode.custom-mode .hint {
        font-size: 9px;
      }

      .generate {
        position: absolute;
        right: 22px;
        bottom: 18px;
        left: 76px;
        z-index: 3;
        width: auto;
        height: 42px;
        border-radius: 7px;
        color: #ffffff;
        background: var(--accent);
        font-size: 14px;
        font-weight: 820;
        box-shadow: var(--shadow);
      }

      .quota {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: #9aa0ab;
        font-size: 11px;
        font-weight: 650;
      }

      .quota a {
        color: var(--accent);
        text-decoration: none;
      }

      .main {
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        background: #ffffff;
      }

      .content {
        display: flex;
        flex-direction: column;
        gap: 14px;
        height: 100%;
        min-height: 0;
        overflow-x: hidden;
        overflow-y: auto;
        padding: 24px 24px 26px;
      }

      .result-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .result-title {
        display: flex;
        align-items: baseline;
        gap: 12px;
        font-weight: 820;
      }

      .result-title span {
        color: #9aa0ab;
        font-weight: 720;
      }

      .result-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .text-action {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        height: 30px;
        padding: 0 9px;
        border-radius: 7px;
        color: var(--accent);
        background: transparent;
        font-weight: 750;
      }

      .place-action {
        color: #ffffff;
        background: var(--accent);
      }

      .place-dialog {
        position: fixed;
        inset: 0;
        z-index: 80;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(17, 19, 24, 0.18);
        backdrop-filter: blur(8px);
      }

      .place-dialog.open {
        display: flex;
      }

      .html-preview-dialog {
        position: fixed;
        inset: 0;
        z-index: 90;
        display: none;
        padding: 28px;
        background: rgba(17, 19, 24, 0.24);
        backdrop-filter: blur(8px);
      }

      .html-preview-dialog.open {
        display: grid;
      }

      .html-preview-card {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        border: 1px solid #e4e7ee;
        border-radius: 20px;
        background: #ffffff;
        box-shadow: 0 24px 70px rgba(20, 24, 36, 0.22);
        overflow: hidden;
      }

      .html-preview-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 18px;
        border-bottom: 1px solid #eef0f4;
      }

      .html-preview-head strong {
        font-size: 18px;
        font-weight: 850;
      }

      .html-preview-actions {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-left: auto;
      }

      .html-preview-import {
        height: 34px;
        padding: 0 13px;
        border-radius: 9px;
        color: #ffffff;
        background: #111318;
        font-size: 13px;
        font-weight: 820;
      }

      .html-preview-import:disabled {
        color: #ffffff;
        background: #9aa0aa;
        cursor: not-allowed;
      }

      .html-preview-close {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: #f3f4f7;
        color: #6d7280;
        font-size: 24px;
        font-weight: 800;
      }

      .html-preview-frame {
        flex: 1 1 auto;
        width: 100%;
        height: 100%;
        min-height: 0;
        border: 0;
        background: #e8e8e8;
      }

      .place-dialog-card {
        width: min(520px, 100%);
        padding: 22px;
        border: 1px solid #e8ebf1;
        border-radius: 20px;
        background: #ffffff;
        box-shadow: 0 24px 70px rgba(20, 24, 36, 0.18);
      }

      .place-dialog-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .place-dialog-head strong {
        font-size: 22px;
        font-weight: 850;
      }

      .place-dialog-close {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        background: #f3f4f7;
        color: #6d7280;
        font-size: 26px;
        font-weight: 800;
      }

      .place-option-grid {
        display: grid;
        gap: 12px;
      }

      .place-option {
        display: grid;
        gap: 6px;
        width: 100%;
        padding: 18px;
        border: 1px solid #e4e7ee;
        border-radius: 16px;
        background: #ffffff;
        text-align: left;
      }

      .place-option[hidden] {
        display: none !important;
      }

      .place-option:hover {
        border-color: #111318;
        box-shadow: 0 12px 28px rgba(20, 24, 36, 0.08);
      }

      .place-option strong {
        font-size: 17px;
        font-weight: 850;
        color: #171a22;
      }

      .place-option span {
        color: #7b8190;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.45;
      }

      .place-option.experiment {
        background: #fbfbfc;
      }

      .result-view {
        display: flex;
        flex-direction: column;
        gap: 0;
        flex: 0 0 auto;
        min-height: 0;
      }

      .result-card {
        position: relative;
        display: grid;
        place-items: center;
        overflow: hidden;
        width: 100%;
        min-height: min(620px, calc(100vh - 220px));
        padding: 16px 56px 18px;
        border-radius: 18px;
        border: 1px solid #eef0f4;
        background: #fbfbfc;
      }

      .result-card.slice-mode {
        cursor: crosshair;
      }

      .result-frame {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        width: 100%;
        height: 100%;
        min-height: 0;
        padding: 18px 18px 22px;
        background: transparent;
        overflow: auto;
      }

      .result-canvas {
        position: relative;
        display: inline-block;
        flex: 0 0 auto;
      }

      .result-card img {
        display: block;
        width: auto;
        height: auto;
        max-width: 100%;
        max-height: 100%;
        border-radius: 18px;
        background: transparent;
        filter: drop-shadow(0 18px 28px rgba(20, 24, 36, 0.16));
      }

      .slice-layer {
        position: absolute;
        inset: 0;
        z-index: 4;
        pointer-events: none;
      }

      .result-card.slice-mode .slice-layer {
        pointer-events: auto;
      }

      .slice-cutout {
        position: absolute;
        border-radius: 5px;
        overflow: hidden;
        background:
          linear-gradient(45deg, #eceef3 25%, transparent 25%),
          linear-gradient(-45deg, #eceef3 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #eceef3 75%),
          linear-gradient(-45deg, transparent 75%, #eceef3 75%);
        background-color: rgba(255, 255, 255, 0.92);
        background-size: cover;
        background-position: center;
        opacity: 0;
        pointer-events: none;
      }

      .slice-cutout::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, 0.12);
        box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.18);
        pointer-events: none;
      }

      .slice-box {
        position: absolute;
        border: 1.5px solid #111318;
        border-radius: 5px;
        background: rgba(17, 19, 24, 0.08);
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.8) inset;
      }

      .slice-box.active {
        border-color: #1778ff;
        background: rgba(23, 120, 255, 0.12);
      }

      .slice-box.active {
        cursor: move;
      }

      .slice-handle {
        position: absolute;
        width: 10px;
        height: 10px;
        border: 2px solid #1778ff;
        border-radius: 50%;
        background: #ffffff;
        box-shadow: 0 2px 8px rgba(23, 120, 255, 0.22);
      }

      .slice-handle[data-slice-handle="nw"],
      .slice-handle[data-slice-handle="se"] {
        cursor: nwse-resize;
      }

      .slice-handle[data-slice-handle="ne"],
      .slice-handle[data-slice-handle="sw"] {
        cursor: nesw-resize;
      }

      .slice-handle[data-slice-handle="n"],
      .slice-handle[data-slice-handle="s"] {
        cursor: ns-resize;
      }

      .slice-handle[data-slice-handle="e"],
      .slice-handle[data-slice-handle="w"] {
        cursor: ew-resize;
      }

      .slice-handle[data-slice-handle="nw"] {
        top: -6px;
        left: -6px;
      }

      .slice-handle[data-slice-handle="n"] {
        top: -6px;
        left: calc(50% - 5px);
      }

      .slice-handle[data-slice-handle="ne"] {
        top: -6px;
        right: -6px;
      }

      .slice-handle[data-slice-handle="e"] {
        top: calc(50% - 5px);
        right: -6px;
      }

      .slice-handle[data-slice-handle="se"] {
        right: -6px;
        bottom: -6px;
      }

      .slice-handle[data-slice-handle="s"] {
        bottom: -6px;
        left: calc(50% - 5px);
      }

      .slice-handle[data-slice-handle="sw"] {
        bottom: -6px;
        left: -6px;

      .slice-handle[data-slice-handle="w"] {

            <section class="section">

            <section id="customSizeCard" class="size-card hidden">

                <div class="link-icon">↔</div>
                <div class="size-field">
                  <label for="height">高度</label>
                  <input id="height" type="number" min="256" max="4096" value="844" />

            <section class="section">

                <button class="choice active" type="button" data-count="4"><span class="choice-main">4</span></button>
                <button class="choice" type="button" data-count="8"><span class="choice-main">8</span></button>

              <button class="provider-option" type="button" data-provider="openai">
                <strong>官方 OpenAI</strong>
                <span>gpt-image-2</span>
              </button>
              <button class="provider-option" type="button" data-provider="openrouter">
                <strong>OpenRouter</strong>
                <span>gpt-5.4-image-2</span>
              </button>

            <div class="provider-row">
              <div class="provider-icon">API</div>

                <input id="providerBaseUrl" type="url" value="https://api.openai.com" />
              </div>
              <div class="config-field">
                <label for="apiModel">模型</label>

                <button id="clearApiConfig" class="config-clear" type="button">清空配置</button>

              <div id="apiConfigStatus" class="config-status"></div>

        event.preventDefault();
        const rect = sliceSettingsDrawer.getBoundingClientRect();
        sliceSettingsPosition = { left: rect.left, top: rect.top };
        sliceSettingsDrag = {
          pointerId: event.pointerId,
          startX: event.clientX,
          startY: event.clientY,
          startLeft: rect.left,
          startTop: rect.top
        };
        sliceSettingsDrawer.classList.add("dragging");
        sliceSettingsDrawer.setPointerCapture(event.pointerId);
      });

        if (!sliceSettingsDrag || event.pointerId !== sliceSettingsDrag.pointerId) {
          return;
        }
        const rect = sliceSettingsDrawer.getBoundingClientRect();
        const next = clampSliceSettingsPosition(
          sliceSettingsDrag.startLeft + event.clientX - sliceSettingsDrag.startX,
          sliceSettingsDrag.startTop + event.clientY - sliceSettingsDrag.startY,
          rect.width,
          rect.height
        );
        setSliceSettingsPosition(next);
      });

      sliceSettingsDrawer.addEventListener("pointerup", (event) => {
        if (!sliceSettingsDrag || event.pointerId !== sliceSettingsDrag.pointerId) {

      function initUiWindowState() {
        const stored = readStoredWindowState();
        if (stored) {

        } else {
          saveWindowState({
            ...lastExpandedWindow,
            collapsed: false
          });
        }
      }

      function applyHostWindowState(state) {
        if (!state || typeof state !== "object") {
          return;
        }
        const collapsed = Boolean(state.collapsed);
        if (!collapsed) {
          lastExpandedWindow = normalizeWindowSize(state.width, state.height);
        }
        setUiCollapsed(collapsed, false);

      function handleViewportResize() {
        if (isUiCollapsed) {
          return;
        }
        lastExpandedWindow = normalizeWindowSize(window.innerWidth, window.innerHeight);
        window.clearTimeout(saveWindowStateTimer);
        saveWindowStateTimer = window.setTimeout(() => {
          saveWindowState({
            ...lastExpandedWindow,
            collapsed: false
          });
        }, 240);
      }

      function setUiCollapsed(collapsed, notifyHost) {
        isUiCollapsed = collapsed;
        document.body.classList.toggle("collapsed", isUiCollapsed);
        windowToggle.textContent = isUiCollapsed ? "展开" : "−";
        windowToggle.setAttribute("aria-label", isUiCollapsed ? "展开窗口" : "收起窗口");
        windowToggle.title = isUiCollapsed ? "展开窗口" : "收起窗口";
        const nextState = {
          ...lastExpandedWindow,
          collapsed: isUiCollapsed
        };
        saveWindowState(nextState);
        if (notifyHost) {
          postPluginMessage({
            type: "set-ui-collapsed",
            collapsed: isUiCollapsed
          });
          if (!isEmbeddedPluginHost()) {
            postPluginMessage({
              type: "resize-ui",
              width: isUiCollapsed ? COLLAPSED_UI_WINDOW.width : lastExpandedWindow.width,
              height: isUiCollapsed ? COLLAPSED_UI_WINDOW.height : lastExpandedWindow.height
            });
          }
        }
      }

      function saveWindowState(state) {
        safeStorageSet(UI_WINDOW_STORAGE_KEY, JSON.stringify(state));
        postPluginMessage({
          type: "save-ui-window-state",
          state
        });
      }

      function readStoredWindowState() {
        const raw = safeStorageGet(UI_WINDOW_STORAGE_KEY);
        if (!raw) {
          return null;
        }
        try {
          return JSON.parse(raw);
        } catch {
          return null;
        }
      }

      function normalizeWindowSize(width, height) {
        return {
          width: Math.round(clampNumber(Number(width), 360, 2200, DEFAULT_UI_WINDOW.width)),
          height: Math.round(clampNumber(Number(height), 240, 1600, DEFAULT_UI_WINDOW.height))
        };

      function postPluginMessage(pluginMessage) {

      async function createBackendManifest(options) {
        if (options.mode === "image-to-image") {
          return createBackendImageEditManifest(options);
        }

        const response = await fetch(`${PROXY_BASE_URL}/api/images/generate`, {
          method: "POST",
          headers: {
            "content-type": "application/json"
          },
          body: JSON.stringify({
            prompt: options.prompt,
            width: options.width,
            height: options.height,
            count: options.count,
            quality: "high",
            outputFormat: "png",
            background: "opaque"
          })
        });

        if (!response.ok) {
          const errorBody = await response.json().catch(() => ({}));
          throw new Error(errorBody.error || `API request failed: ${response.status}`);
        }

        const data = await response.json();
        if (!Array.isArray(data.images) || data.images.length === 0) {
          throw new Error("API did not return images");
        }

        const resultImages = await prepareResultImages(data.images);
        const screen = createScreenFromResultImage(resultImages[0], {
          name: "ai_app_home_api",
          width: options.width,
          height: options.height
        });
        const assets = getPlannedAssets(screen).map((asset) => ({
          ...asset,
          dataUrl: createTransparentAssetPng(asset.placement.width, asset.placement.height, asset.kind)
        }));
        return {
          version: "1.0.0",
          mode: "api",
          provider: data.provider || null,
          sourcePrompt: options.prompt,
          style: options.style,
          screen,
          previewImage: {
            dataUrl: resultImages[0].dataUrl
          },
          resultImages,
          assets
        };
      }

      async function createTransparentAssetsFromBackend(options, screen) {
        const plannedAssets = getPlannedAssets(screen);
        const results = await Promise.allSettled(
          plannedAssets.map(async (asset) => {
            const response = await fetch(`${PROXY_BASE_URL}/api/assets/generate-transparent`, {
              method: "POST",
              headers: {
                "content-type": "application/json"
              },
              body: JSON.stringify({
                prompt: asset.prompt,
                width: asset.placement.width,
                height: asset.placement.height,
                quality: "high"
              })
            });

            if (!response.ok) {
              const errorBody = await response.json().catch(() => ({}));
              throw new Error(errorBody.error || `Asset request failed: ${response.status}`);
            }

            const data = await response.json();
            const image = data.images && data.images[0];
            if (!image || !image.dataUrl) {
              throw new Error(`Asset ${asset.name} did not return image data`);
            }

            return {
              ...asset,
              dataUrl: image.dataUrl
            };
          })
        );

        return plannedAssets.map((asset, index) => {
          const result = results[index];
          if (result.status === "fulfilled") {
            return result.value;
          }
          return {
            ...asset,
            dataUrl: createTransparentAssetPng(asset.placement.width, asset.placement.height, asset.kind)
          };
        });
      }

      function renderResults(manifest) {
        activeResultIndex = 0;
        activeSliceId = null;
        sliceEdit = null;
        isSliceMode = false;
        sliceModeButton.classList.remove("active");
        ensureSliceState(manifest);
        renderActiveResult(manifest);

      function renderLoadingResult(message) {
        resultGrid.innerHTML = `
          <div class="result-loading" role="status" aria-live="polite">
            <div class="loading-preview" aria-hidden="true"></div>
            <div class="loading-label">正在生成图片</div>
            <div class="loading-note">${message}</div>
          </div>
        `;
        resultCount.textContent = "生成中";
      }

      function renderErrorResult(message) {
        resultGrid.innerHTML = `
          <div class="result-error" role="alert">
            <strong>没有生成成功</strong>
            <span>${escapeHtml(message)}</span>
          </div>
        `;
        resultCount.textContent = "生成失败";
      }

      function renderActiveResult(manifest) {
        const scrollState = getResultFrameScrollState();
        resultGrid.innerHTML = "";
        const activeImage = manifest.resultImages[activeResultIndex] || manifest.resultImages[0];
        const shouldRestoreScroll = scrollState && scrollState.resultId === activeImage.id;
        ensureImageSliceState(activeImage);
        manifest.previewImage = { dataUrl: activeImage.dataUrl };
        const hasMultiple = manifest.resultImages.length > 1;

        const card = document.createElement("div");
        card.className = `result-card${isSliceMode ? " slice-mode" : ""}`;
        card.innerHTML = `
          <div class="result-frame">
            <div class="result-canvas">
              <img src="${activeImage.dataUrl}" alt="当前生成结果" />
              <div class="slice-layer" aria-label="切图选择层"></div>
            </div>
          </div>
          <button class="carousel-nav prev" type="button" aria-label="上一张" ${hasMultiple ? "" : "disabled"}>‹</button>
          <button class="carousel-nav next" type="button" aria-label="下一张" ${hasMultiple ? "" : "disabled"}>›</button>
          <button class="download" type="button" aria-label="下载单张">↓</button>
        `;
        card.querySelector(".carousel-nav.prev").addEventListener("click", () => {
          if (!hasMultiple) {
            return;
          }
          activeResultIndex = (activeResultIndex - 1 + manifest.resultImages.length) % manifest.resultImages.length;
          activeSliceId = null;
          sliceEdit = null;
          renderActiveResult(manifest);
          renderCutModules(manifest);
        });
        card.querySelector(".carousel-nav.next").addEventListener("click", () => {
          if (!hasMultiple) {
            return;
          }
          activeResultIndex = (activeResultIndex + 1) % manifest.resultImages.length;
          activeSliceId = null;
          sliceEdit = null;
          renderActiveResult(manifest);
          renderCutModules(manifest);
        });
        card.querySelector(".download").addEventListener("click", () => {
          triggerImageDownload(activeImage.dataUrl, buildDownloadFilename(activeResultIndex));
          setStatus(`已开始下载第 ${activeResultIndex + 1} 张图片。`);
        });
        resultGrid.appendChild(card);
        renderedResultImageId = activeImage.id;
        const frame = card.querySelector(".result-frame");
        const image = card.querySelector("img");
        const layer = card.querySelector(".slice-layer");
        bindSliceLayer(card, layer, image);
        attachPreviewFit(image, frame);
        image.addEventListener("load", () => {
          renderSliceOverlay(card, layer, image);
          if (shouldRestoreScroll) {
            restoreResultFrameScroll(frame, scrollState);
          }
        }, { once: true });
        if (image.complete) {
          renderSliceOverlay(card, layer, image);
          if (shouldRestoreScroll) {
            restoreResultFrameScroll(frame, scrollState);
          }
        }
      }

      function getResultFrameScrollState() {
        const frame = resultGrid.querySelector(".result-frame");
        if (!frame || !renderedResultImageId) {
          return null;
        }
        return {
          resultId: renderedResultImageId,
          left: frame.scrollLeft,
          top: frame.scrollTop
        };
      }

      function restoreResultFrameScroll(frame, scrollState) {
        if (!frame || !scrollState) {
          return;
        }
        const apply = () => {
          frame.scrollLeft = scrollState.left;
          frame.scrollTop = scrollState.top;
        };
        apply();
        requestAnimationFrame(() => {
          apply();
          requestAnimationFrame(apply);
        });
      }

      function renderCutModules(manifest) {
        if (!manifest?.resultImages?.length) {
          renderEmptyCutModules();
          return;
        }
        cutSection.classList.add("open");
        const activeImage = getActiveResultImage();
        ensureImageSliceState(activeImage);
        const assets = activeImage.sliceManifest.assets;
        exportSlicesButton.disabled = assets.length === 0;
        transparentAllButton.disabled = assets.length === 0 || assets.every((asset) => asset.transparent);
        cutHelp.textContent = isSliceMode ? "拖拽主图创建切图区域" : "点击“切图”后框选区域";
        if (assets.length === 0) {
          closeSliceSettingsDrawer();
          cutGrid.innerHTML = `<div class="cut-empty">还没有切图区域</div>`;
          return;
        }
        cutGrid.innerHTML = assets.map((asset, index) => `
          <div class="cut-item${asset.id === activeSliceId ? " active" : ""}" data-slice-id="${asset.id}">
            <img class="cut-thumb" src="${asset.dataUrl}" alt="${escapeHtml(asset.name)}" style="border-radius:${Math.min(12, getSliceRadius(asset))}px;" />
            <div class="cut-meta">
              <span class="cut-name">${index + 1}. ${escapeHtml(asset.name)}</span>
              <span class="cut-size">${asset.placement.width} × ${asset.placement.height}${getSliceRadius(asset) ? ` · R${getSliceRadius(asset)}` : ""}${asset.transparent ? " · 透明 PNG" : ""}${asset.aiTransparent ? " · AI 透明" : ""}${asset.svgData ? " · SVG" : ""}${asset.aiRedrawn ? " · AI 重绘" : ""}</span>
            </div>
            <details class="cut-action-menu">
              <summary class="cut-action-trigger">透明</summary>
              <div class="cut-action-list">
                <button class="cut-transparent${asset.transparent && !asset.aiTransparent ? " done" : ""}" type="button" data-transparent-slice="${asset.id}">${asset.transparent && !asset.aiTransparent ? "已透明" : "透明"}</button>
                <button class="cut-ai-transparent${asset.aiTransparent ? " done" : ""}" type="button" data-ai-transparent-slice="${asset.id}">${asset.aiTransparent ? "AI已透明" : "AI透明"}</button>
              </div>
            </details>
            <details class="cut-action-menu">
              <summary class="cut-action-trigger">SVG</summary>
              <div class="cut-action-list">
                <button class="cut-svg${asset.svgData && !asset.aiRedrawn ? " done" : ""}" type="button" data-svg-slice="${asset.id}">${asset.svgData && !asset.aiRedrawn ? "SVG" : "转 SVG"}</button>
                <button class="cut-redraw${asset.aiRedrawn && asset.svgData ? " done" : ""}" type="button" data-redraw-slice="${asset.id}">${asset.aiRedrawn && asset.svgData ? "AI SVG" : "AI 重绘 SVG"}</button>
              </div>
            </details>
            <button class="cut-remove" type="button" aria-label="删除 ${escapeHtml(asset.name)}" data-remove-slice="${asset.id}">×</button>
          </div>
        `).join("");
        cutGrid.querySelectorAll(".cut-action-menu").forEach((menu) => {
          menu.addEventListener("click", (event) => {
            event.stopPropagation();
          });
          menu.addEventListener("toggle", () => {
            if (menu.open) {
              cutGrid.querySelectorAll(".cut-action-menu[open]").forEach((otherMenu) => {
                if (otherMenu !== menu) {
                  otherMenu.open = false;
                }
              });
            }
            requestAnimationFrame(() => {
              if (cutGrid.querySelector(".cut-action-menu[open]")) {
                cutGrid.classList.add("menu-open");
              } else {
                cutGrid.classList.remove("menu-open");
              }
            });
          });
        });
        cutGrid.querySelectorAll("[data-slice-id]").forEach((item) => {
          item.addEventListener("click", (event) => {
            if (event.target.closest("[data-remove-slice]")) {
              return;
            }
            const shouldSyncDrawer = sliceSettingsDrawer.classList.contains("open");
            activeSliceId = item.dataset.sliceId;
            if (shouldSyncDrawer) {
              sliceSettingsId = activeSliceId;
            }
            renderActiveResult(manifest);
            renderCutModules(manifest);
            if (shouldSyncDrawer) {
              renderSliceSettingsDrawer();
            }
          });
        });
        cutGrid.querySelectorAll("[data-remove-slice]").forEach((button) => {
          button.addEventListener("click", () => {
            removeSliceAsset(button.dataset.removeSlice);
          });
        });
        cutGrid.querySelectorAll("[data-transparent-slice]").forEach((button) => {
          button.addEventListener("click", async (event) => {
            event.stopPropagation();
            button.closest(".cut-action-menu")?.removeAttribute("open");
            await makeSliceTransparent(button.dataset.transparentSlice);
          });
        });
        cutGrid.querySelectorAll("[data-ai-transparent-slice]").forEach((button) => {
          button.addEventListener("click", async (event) => {
            event.stopPropagation();
            button.closest(".cut-action-menu")?.removeAttribute("open");
            await makeSliceAiTransparent(button.dataset.aiTransparentSlice);
          });
        });
        cutGrid.querySelectorAll("[data-svg-slice]").forEach((button) => {
          button.addEventListener("click", async (event) => {
            event.stopPropagation();
            button.closest(".cut-action-menu")?.removeAttribute("open");
            await convertSliceToSvg(button.dataset.svgSlice);
          });
        });
        cutGrid.querySelectorAll("[data-redraw-slice]").forEach((button) => {
          button.addEventListener("click", async (event) => {
            event.stopPropagation();
            button.closest(".cut-action-menu")?.removeAttribute("open");
            await redrawSliceToSvg(button.dataset.redrawSlice);
          });
        });
      }

      function renderSliceNumberControl(asset, field, label, value) {
        const min = field === "radius" ? 0 : (field === "x" || field === "y" ? 0 : 1);
        const max = getSliceFieldMax(asset, field);
        return `
          <label class="slice-settings-field">
            <span>${label}</span>
            <input type="number" inputmode="numeric" min="${min}" max="${max}" step="1" value="${Math.round(Number(value) || 0)}" data-slice-id="${asset.id}" data-slice-field="${field}" />
          </label>
        `;
      }

      function openSliceSettingsDrawer(id) {
        const asset = getActiveSliceAsset(id);
        if (!asset) {
          closeSliceSettingsDrawer();
          return;
        }
        activeSliceId = id;
        sliceSettingsId = id;
        renderSliceSettingsDrawer();
        if (sliceSettingsPosition) {
          setSliceSettingsPosition(sliceSettingsPosition);
        } else {
          sliceSettingsDrawer.style.left = "";
          sliceSettingsDrawer.style.top = "";
          sliceSettingsDrawer.style.right = "20px";
        }
        sliceSettingsDrawer.classList.add("open");
        sliceSettingsDrawer.setAttribute("aria-hidden", "false");
      }

      function closeSliceSettingsDrawer() {
        sliceSettingsId = null;
        sliceSettingsDrawer.classList.remove("open");
        sliceSettingsDrawer.setAttribute("aria-hidden", "true");
      }

      function clampSliceSettingsPosition(left, top, width, height) {
        const margin = 12;
        const maxLeft = Math.max(margin, window.innerWidth - width - margin);
        const maxTop = Math.max(margin, window.innerHeight - height - margin);
        return {
          left: Math.round(clampNumber(left, margin, maxLeft, margin)),
          top: Math.round(clampNumber(top, margin, maxTop, margin))
        };
      }

      function setSliceSettingsPosition(position) {
        const rect = sliceSettingsDrawer.getBoundingClientRect();
        const next = clampSliceSettingsPosition(position.left, position.top, rect.width || 340, rect.height || 360);
        sliceSettingsPosition = next;
        sliceSettingsDrawer.style.left = `${next.left}px`;
        sliceSettingsDrawer.style.top = `${next.top}px`;
        sliceSettingsDrawer.style.right = "auto";
      }

      function renderSliceSettingsDrawer() {
        const asset = getActiveSliceAsset(sliceSettingsId || activeSliceId);
        if (!asset) {
          closeSliceSettingsDrawer();
          return;
        }
        sliceSettingsTitle.textContent = asset.name;
        sliceSettingsBody.innerHTML = `
          <div class="slice-settings-grid">
            ${renderSliceNumberControl(asset, "x", "X 坐标", asset.placement.x)}
            ${renderSliceNumberControl(asset, "y", "Y 坐标", asset.placement.y)}
            ${renderSliceNumberControl(asset, "width", "宽度", asset.placement.width)}
            ${renderSliceNumberControl(asset, "height", "高度", asset.placement.height)}
            ${renderSliceNumberControl(asset, "radius", "圆角", getSliceRadius(asset))}
          </div>
          <div class="slice-settings-note">输入后会先实时预览；离开输入框或回车后会重新裁切资产。圆角只影响展示、放入 Figma 和导出时的圆角效果。</div>
        `;
        sliceSettingsBody.querySelectorAll("[data-slice-field]").forEach((input) => {
          input.addEventListener("input", () => {
            updateSliceAssetGeometry(input.dataset.sliceId, input.dataset.sliceField, input.value, false);
          });
          input.addEventListener("change", async () => {
            await updateSliceAssetGeometry(input.dataset.sliceId, input.dataset.sliceField, input.value, true);
          });
          input.addEventListener("keydown", async (event) => {
            if (event.key === "Enter") {
              event.preventDefault();
              input.blur();
            }
          });
        });
      }

      function renderEmptyCutModules() {
        cutSection.classList.remove("open");
        closeSliceSettingsDrawer();
        exportSlicesButton.disabled = true;
        transparentAllButton.disabled = true;
        cutGrid.innerHTML = "";
      }

      function ensureSliceState(manifest) {
        (manifest.resultImages || []).forEach(ensureImageSliceState);
      }

      function ensureImageSliceState(image) {
        if (!image) {
          return;
        }
        if (!image.sliceManifest) {
          image.sliceManifest = { assets: [] };
        }
        if (!Array.isArray(image.sliceManifest.assets)) {
          image.sliceManifest.assets = [];
        }
      }

      function getActiveResultImage() {
        if (!currentManifest?.resultImages?.length) {
          return null;
        }
        return currentManifest.resultImages[activeResultIndex] || currentManifest.resultImages[0];
      }

      function bindSliceLayer(card, layer, image) {
        if (!card || !layer || !image) {
          return;
        }
        layer.addEventListener("pointerdown", (event) => {
          if (!isSliceMode || event.button !== 0) {
            return;
          }
          const imageRect = image.getBoundingClientRect();
          const settingsTarget = event.target.closest("[data-slice-settings]");
          if (settingsTarget) {
            event.preventDefault();
            event.stopPropagation();
            activeSliceId = settingsTarget.dataset.sliceSettings;
            openSliceSettingsDrawer(activeSliceId);
            renderSliceOverlay(card, layer, image);
            renderCutModules(currentManifest);
            return;
          }
          const handle = event.target.closest("[data-slice-handle]");
          const sliceBox = event.target.closest("[data-slice-id]");
          if (sliceBox) {
            const asset = getActiveSliceAsset(sliceBox.dataset.sliceId);
            if (!asset) {
              return;
            }
            event.preventDefault();
            event.stopPropagation();
            activeSliceId = asset.id;
            layer.setPointerCapture(event.pointerId);
            const point = pointToScreenCoords(event.clientX, event.clientY, imageRect);
            sliceEdit = {
              id: asset.id,
              mode: handle?.dataset.sliceHandle || "move",
              startX: point.x,
              startY: point.y,
              original: { ...asset.placement }
            };
            renderSliceOverlay(card, layer, image);
            renderCutModules(currentManifest);
            return;
          }
          if (!isPointInsideRect(event.clientX, event.clientY, imageRect)) {
            return;
          }
          event.preventDefault();
          layer.setPointerCapture(event.pointerId);
          const startPoint = pointToScreenCoords(event.clientX, event.clientY, imageRect);
          sliceDraft = {
            startX: startPoint.x,
            startY: startPoint.y,
            currentX: startPoint.x,
            currentY: startPoint.y
          };
          renderSliceOverlay(card, layer, image);
        });

        layer.addEventListener("pointermove", (event) => {
          if (sliceEdit) {
            const imageRect = image.getBoundingClientRect();
            const point = pointToScreenCoords(event.clientX, event.clientY, imageRect);
            const asset = getActiveSliceAsset(sliceEdit.id);
            if (!asset) {
              return;
            }
            asset.placement = normalizeEditedPlacement(sliceEdit, point);
            renderSliceOverlay(card, layer, image);
            return;
          }
          if (!sliceDraft) {
            return;
          }
          const imageRect = image.getBoundingClientRect();
          const point = pointToScreenCoords(event.clientX, event.clientY, imageRect);
          sliceDraft.currentX = point.x;
          sliceDraft.currentY = point.y;
          renderSliceOverlay(card, layer, image);
        });

        layer.addEventListener("pointerup", async (event) => {
          if (sliceEdit) {
            layer.releasePointerCapture(event.pointerId);
            const editId = sliceEdit.id;
            sliceEdit = null;
            await updateSliceAssetCrop(editId);
            renderActiveResult(currentManifest);
            renderCutModules(currentManifest);
            setStatus("已更新切图区域。");
            return;
          }
          if (!sliceDraft) {
            return;
          }
          layer.releasePointerCapture(event.pointerId);
          const draft = normalizeDraftRect(sliceDraft);
          sliceDraft = null;
          if (draft.width < 8 || draft.height < 8) {
            renderSliceOverlay(card, layer, image);
            return;
          }
          await addSliceAsset(draft);
        });

        layer.addEventListener("pointercancel", () => {
          sliceDraft = null;
          sliceEdit = null;
          renderSliceOverlay(card, layer, image);
        });
      }

      function renderSliceOverlay(card, layer, image) {
        if (!card || !layer || !image || !currentManifest?.screen) {
          return;
        }
        const activeImage = getActiveResultImage();
        ensureImageSliceState(activeImage);
        const imageRect = image.getBoundingClientRect();
        const scaleX = imageRect.width / currentManifest.screen.width;
        const scaleY = imageRect.height / currentManifest.screen.height;
        const assets = activeImage?.sliceManifest?.assets || [];

        const cutouts = assets.map((asset) => {
          const placement = asset.placement;
          const radius = getSliceRadius(asset);
          return `
            <div class="slice-cutout" style="
              left:${placement.x * scaleX}px;
              top:${placement.y * scaleY}px;
              width:${placement.width * scaleX}px;
              height:${placement.height * scaleY}px;
              border-radius:${radius * Math.min(scaleX, scaleY)}px;
            "></div>
          `;
        });

        const boxes = assets.map((asset, index) => {
          const placement = asset.placement;
          const radius = getSliceRadius(asset);
          const activeHandles = asset.id === activeSliceId ? `
              <span class="slice-handle" data-slice-handle="nw"></span>
              <span class="slice-handle" data-slice-handle="n"></span>
              <span class="slice-handle" data-slice-handle="ne"></span>
              <span class="slice-handle" data-slice-handle="e"></span>
              <span class="slice-handle" data-slice-handle="se"></span>
              <span class="slice-handle" data-slice-handle="s"></span>
              <span class="slice-handle" data-slice-handle="sw"></span>
              <span class="slice-handle" data-slice-handle="w"></span>
          ` : "";
          return `
            <button class="slice-box${asset.id === activeSliceId ? " active" : ""}" type="button" data-slice-id="${asset.id}" style="
              left:${placement.x * scaleX}px;
              top:${placement.y * scaleY}px;
              width:${placement.width * scaleX}px;
              height:${placement.height * scaleY}px;
              border-radius:${radius * Math.min(scaleX, scaleY)}px;
            ">
              <span class="slice-label" data-slice-settings="${asset.id}" title="打开切图设置">${index + 1}. ${escapeHtml(asset.name)}</span>
              ${activeHandles}
            </button>
          `;
        });

        if (sliceDraft) {
          const draft = normalizeDraftRect(sliceDraft);
          boxes.push(`
            <div class="slice-draft" style="
              left:${draft.x * scaleX}px;
              top:${draft.y * scaleY}px;
              width:${draft.width * scaleX}px;
              height:${draft.height * scaleY}px;
            "></div>
          `);
        }

        layer.innerHTML = [...cutouts, ...boxes].join("");
        layer.querySelectorAll("[data-slice-id]").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            if (event.target.closest("[data-slice-settings]")) {
              openSliceSettingsDrawer(button.dataset.sliceId);
              renderSliceOverlay(card, layer, image);
              renderCutModules(currentManifest);
              return;
            }
            activeSliceId = button.dataset.sliceId;
            renderSliceOverlay(card, layer, image);
            renderCutModules(currentManifest);
          });
        });
      }

      function getActiveSliceAsset(id) {
        const activeImage = getActiveResultImage();
        ensureImageSliceState(activeImage);
        return activeImage?.sliceManifest?.assets.find((asset) => asset.id === id) || null;
      }

      function getSliceFieldMax(asset, field) {
        const screen = currentManifest?.screen || { width: 4096, height: 4096 };
        const placement = asset?.placement || {};
        if (field === "x") {
          return Math.max(0, Math.round(screen.width - Math.max(1, Number(placement.width) || 1)));
        }
        if (field === "y") {
          return Math.max(0, Math.round(screen.height - Math.max(1, Number(placement.height) || 1)));
        }
        if (field === "width") {
          return Math.max(1, Math.round(screen.width - Math.max(0, Number(placement.x) || 0)));
        }
        if (field === "height") {
          return Math.max(1, Math.round(screen.height - Math.max(0, Number(placement.y) || 0)));
        }
        if (field === "radius") {
          return Math.max(0, Math.floor(Math.min(Number(placement.width) || 0, Number(placement.height) || 0) / 2));
        }
        return 4096;
      }

      function getSliceRadius(asset) {
        if (!asset) {
          return 0;
        }
        return Math.round(clampNumber(Number(asset.radius) || 0, 0, getSliceFieldMax(asset, "radius"), 0));
      }

      function normalizeSlicePlacement(placement) {
        const screen = currentManifest?.screen || { width: 4096, height: 4096 };
        const minSize = 1;
        const baseX = Math.round(clampNumber(Number(placement.x) || 0, 0, screen.width - minSize, 0));
        const baseY = Math.round(clampNumber(Number(placement.y) || 0, 0, screen.height - minSize, 0));
        const width = Math.round(clampNumber(Number(placement.width) || minSize, minSize, screen.width - baseX, minSize));
        const height = Math.round(clampNumber(Number(placement.height) || minSize, minSize, screen.height - baseY, minSize));
        return {
          x: baseX,
          y: baseY,
          width,
          height
        };
      }

      async function updateSliceAssetGeometry(id, field, rawValue, shouldCommit) {
        const asset = getActiveSliceAsset(id);
        if (!asset) {
          return;
        }
        const value = Math.round(Number(rawValue));
        if (!Number.isFinite(value)) {
          return;
        }
        if (field === "radius") {
          asset.radius = Math.round(clampNumber(value, 0, getSliceFieldMax(asset, "radius"), 0));
        } else if (["x", "y", "width", "height"].includes(field)) {
          asset.placement = normalizeSlicePlacement({
            ...asset.placement,
            [field]: value
          });
          asset.radius = getSliceRadius(asset);
        }
        activeSliceId = id;
        const card = resultGrid.querySelector(".result-card");
        const layer = card?.querySelector(".slice-layer");
        const image = card?.querySelector(".result-canvas img");
        renderSliceOverlay(card, layer, image);
        if (!shouldCommit) {
          return;
        }
        try {
          if (field !== "radius") {
            await updateSliceAssetCrop(id);
          }
          renderActiveResult(currentManifest);
          renderCutModules(currentManifest);
          if (sliceSettingsId === id) {
            renderSliceSettingsDrawer();
          }
          setStatus(`已更新切图尺寸：${asset.name}`);
        } catch (error) {
          renderCutModules(currentManifest);
          if (sliceSettingsId === id) {
            renderSliceSettingsDrawer();
          }
          setStatus(`更新切图失败：${error.message || String(error)}`, true);
        }
      }

      function normalizeEditedPlacement(edit, point) {
        const screen = currentManifest.screen;
        const minSize = 8;
        const original = edit.original;
        const deltaX = point.x - edit.startX;
        const deltaY = point.y - edit.startY;
        let x1 = original.x;
        let y1 = original.y;
        let x2 = original.x + original.width;
        let y2 = original.y + original.height;

        if (edit.mode === "move") {
          const nextX = clampNumber(original.x + deltaX, 0, screen.width - original.width, 0);
          const nextY = clampNumber(original.y + deltaY, 0, screen.height - original.height, 0);
          return {
            x: Math.round(nextX),
            y: Math.round(nextY),
            width: original.width,
            height: original.height
          };
        }

        if (edit.mode.includes("w")) {
          x1 = clampNumber(original.x + deltaX, 0, x2 - minSize, 0);
        }
        if (edit.mode.includes("e")) {
          x2 = clampNumber(original.x + original.width + deltaX, x1 + minSize, screen.width, screen.width);
        }
        if (edit.mode.includes("n")) {
          y1 = clampNumber(original.y + deltaY, 0, y2 - minSize, 0);
        }
        if (edit.mode.includes("s")) {
          y2 = clampNumber(original.y + original.height + deltaY, y1 + minSize, screen.height, screen.height);
        }

        return {
          x: Math.round(x1),
          y: Math.round(y1),
          width: Math.max(minSize, Math.round(x2 - x1)),
          height: Math.max(minSize, Math.round(y2 - y1))
        };
      }

      async function addSliceAsset(placement) {
        const activeImage = getActiveResultImage();
        if (!activeImage) {
          return;
        }
        ensureImageSliceState(activeImage);
        const index = activeImage.sliceManifest.assets.length + 1;
        const id = `slice_${activeResultIndex + 1}_${Date.now().toString(36)}_${index}`;
        const name = `slice_${String(index).padStart(2, "0")}`;
        const normalizedPlacement = normalizeSlicePlacement(placement);
        const dataUrl = await cropImageRegion(activeImage.dataUrl, normalizedPlacement);
        const repair = await createSliceRepairPatch(activeImage.dataUrl, normalizedPlacement);
        const asset = {
          id,
          name,
          type: "manual_slice",
          placement: normalizedPlacement,
          radius: 0,
          transparent: false,
          aiTransparent: false,
          aiRedrawn: false,
          selected: true,
          originalDataUrl: dataUrl,
          dataUrl,
          transparentDataUrl: null,
          aiTransparentDataUrl: null,
          svgData: null,
          ...repair
        };
        activeImage.sliceManifest.assets.push(asset);
        activeSliceId = id;
        renderActiveResult(currentManifest);
        renderCutModules(currentManifest);
        setStatus(`已创建切图区域：${name}`);
      }

      async function updateSliceAssetCrop(id) {
        const activeImage = getActiveResultImage();
        const asset = getActiveSliceAsset(id);
        if (!activeImage || !asset) {
          return;
        }
        asset.dataUrl = await cropImageRegion(activeImage.dataUrl, asset.placement);
        Object.assign(asset, await createSliceRepairPatch(activeImage.dataUrl, asset.placement));
        asset.originalDataUrl = asset.dataUrl;
        asset.transparentDataUrl = null;
        asset.aiTransparentDataUrl = null;
        asset.transparent = false;
        asset.aiTransparent = false;
        asset.aiRedrawn = false;
        asset.svgData = null;
        asset.radius = getSliceRadius(asset);
      }

      async function makeSliceTransparent(id) {
        const asset = getActiveSliceAsset(id);
        if (!asset) {
          return;
        }
        setBusy(true, `正在处理透明底：${asset.name}`);
        try {
          asset.originalDataUrl = asset.originalDataUrl || asset.dataUrl;
          asset.dataUrl = await removeEdgeBackground(asset.dataUrl);
          asset.transparentDataUrl = asset.dataUrl;
          asset.transparent = true;
          asset.aiTransparent = false;
          activeSliceId = id;
          renderActiveResult(currentManifest);
          renderCutModules(currentManifest);
          setStatus(`已生成透明 PNG：${asset.name}`);
        } catch (error) {
          setStatus(`透明化失败：${error.message || String(error)}`, true);
        } finally {
          setBusy(false);
        }
      }

      async function makeAllSlicesTransparent() {
        const activeImage = getActiveResultImage();
        ensureImageSliceState(activeImage);
        const assets = activeImage?.sliceManifest?.assets || [];
        const pendingAssets = assets.filter((asset) => !asset.transparent);
        if (pendingAssets.length === 0) {
          setStatus("当前设计稿的切图都已经是透明 PNG。");
          renderCutModules(currentManifest);
