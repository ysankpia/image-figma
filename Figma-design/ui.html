      async function cropImageRegion(dataUrl, placement) {
        const source = await loadImageElement(dataUrl);
        const canvas = document.createElement("canvas");
        canvas.width = placement.width;
        canvas.height = placement.height;
        const context = canvas.getContext("2d");
        context.imageSmoothingEnabled = true;
        context.imageSmoothingQuality = "high";
        context.drawImage(
          source,
          placement.x,
          placement.y,
          placement.width,
          placement.height,
          0,
          0,
          placement.width,
          placement.height
        );
        return canvas.toDataURL("image/png");
      }

      async function createSliceRepairPatch(dataUrl, placement) {
        const source = await loadImageElement(dataUrl);
        const patchWidth = Math.max(1, Math.round(placement.width));
        const patchHeight = Math.max(1, Math.round(placement.height));
        const canvas = document.createElement("canvas");
        canvas.width = patchWidth;
        canvas.height = patchHeight;
        const context = canvas.getContext("2d");
        context.imageSmoothingEnabled = true;
        context.imageSmoothingQuality = "high";

        const edgeStats = sampleImmediatePlacementEdgeStats(source, placement);
        const background = edgeStats.color;
        const sides = edgeStats.sides || {
          top: background,
          right: background,
          bottom: background,
          left: background
        };
        const colorA = toRgb(mixColors(sides.left, sides.top, 0.42));
        const colorB = toRgb(mixColors(sides.right, sides.bottom, 0.42));
        paintEdgeBlendRepairPatch(context, patchWidth, patchHeight, sides, background);

        return {
          repairDataUrl: canvas.toDataURL("image/png"),
          repairBackground: `linear-gradient(135deg, rgba(${colorA}, 0.92), rgba(${colorB}, 0.94))`,
          repairMode: "edge-blend"
        };
      }

      function getExpandedSampleRect(source, placement) {
        const naturalWidth = source.naturalWidth || source.width;
        const naturalHeight = source.naturalHeight || source.height;
        const expandX = Math.max(16, Math.round(placement.width * 0.28));
        const expandY = Math.max(16, Math.round(placement.height * 0.28));
        const x = clampNumber(Math.round(placement.x - expandX), 0, naturalWidth - 1, 0);
        const y = clampNumber(Math.round(placement.y - expandY), 0, naturalHeight - 1, 0);
        const right = clampNumber(Math.round(placement.x + placement.width + expandX), x + 1, naturalWidth, naturalWidth);
        const bottom = clampNumber(Math.round(placement.y + placement.height + expandY), y + 1, naturalHeight, naturalHeight);
        return {
          x,
          y,
          width: Math.max(1, right - x),
          height: Math.max(1, bottom - y)
        };
      }

      async function samplePlacementEdgeStats(source, placement) {
        const sample = getExpandedSampleRect(source, placement);
        const canvas = document.createElement("canvas");
        canvas.width = sample.width;
        canvas.height = sample.height;
        const context = canvas.getContext("2d", { willReadFrequently: true });
        context.drawImage(source, sample.x, sample.y, sample.width, sample.height, 0, 0, sample.width, sample.height);
        const imageData = context.getImageData(0, 0, sample.width, sample.height);
        return sampleEdgeStats(imageData.data, sample.width, sample.height);
      }

      function sampleImmediatePlacementEdgeStats(source, placement) {
        const naturalWidth = source.naturalWidth || source.width;
        const naturalHeight = source.naturalHeight || source.height;
        const x = clampNumber(Math.round(placement.x), 0, naturalWidth - 1, 0);
        const y = clampNumber(Math.round(placement.y), 0, naturalHeight - 1, 0);
        const width = clampNumber(Math.round(placement.width), 1, naturalWidth - x, 1);
        const height = clampNumber(Math.round(placement.height), 1, naturalHeight - y, 1);
        const band = Math.max(2, Math.min(10, Math.round(Math.min(width, height) * 0.12)));
        const canvas = document.createElement("canvas");
        canvas.width = naturalWidth;
        canvas.height = naturalHeight;
        const context = canvas.getContext("2d", { willReadFrequently: true });
        context.drawImage(source, 0, 0, naturalWidth, naturalHeight);

        const sideSamples = {
          top: collectRectColors(context, x, Math.max(0, y - band), width, Math.min(band, y)),
          right: collectRectColors(context, Math.min(naturalWidth - 1, x + width), y, Math.min(band, naturalWidth - x - width), height),
          bottom: collectRectColors(context, x, Math.min(naturalHeight - 1, y + height), width, Math.min(band, naturalHeight - y - height)),
          left: collectRectColors(context, Math.max(0, x - band), y, Math.min(band, x), height)
        };
        const allSamples = [
          ...sideSamples.top,
          ...sideSamples.right,
          ...sideSamples.bottom,
          ...sideSamples.left
        ];
        const color = averageBackgroundColors(allSamples);
        const variance = allSamples.length
          ? allSamples.reduce((sum, sample) => {
              const distance = colorDistance(sample.r, sample.g, sample.b, color.r, color.g, color.b);
              return sum + distance * distance;
            }, 0) / allSamples.length
          : 0;
        return {
          color,
          variance,
          sides: {
            top: averageBackgroundColors(sideSamples.top, color),
            right: averageBackgroundColors(sideSamples.right, color),
            bottom: averageBackgroundColors(sideSamples.bottom, color),
            left: averageBackgroundColors(sideSamples.left, color)
          }
        };
      }

      function collectRectColors(context, x, y, width, height) {
        const rectWidth = Math.max(0, Math.floor(width));
        const rectHeight = Math.max(0, Math.floor(height));
        if (!rectWidth || !rectHeight) {
          return [];
        }
        const imageData = context.getImageData(Math.floor(x), Math.floor(y), rectWidth, rectHeight);
        const pixels = imageData.data;
        const samples = [];
        const step = Math.max(1, Math.floor(Math.sqrt((rectWidth * rectHeight) / 160)));
        for (let row = 0; row < rectHeight; row += step) {
          for (let col = 0; col < rectWidth; col += step) {
            samples.push(getPixelColor(pixels, rectWidth, col, row));
          }
        }
        return samples;
      }

      function paintEdgeBlendRepairPatch(context, width, height, sides, center) {
        const imageData = context.createImageData(width, height);
        const pixels = imageData.data;
        const safeSides = {
          top: sides.top || center,
          right: sides.right || center,
          bottom: sides.bottom || center,
          left: sides.left || center
        };
        for (let y = 0; y < height; y += 1) {
          const verticalAmount = height <= 1 ? 0.5 : y / (height - 1);
          for (let x = 0; x < width; x += 1) {
            const horizontalAmount = width <= 1 ? 0.5 : x / (width - 1);
            const horizontal = mixColors(safeSides.left, safeSides.right, horizontalAmount);
            const vertical = mixColors(safeSides.top, safeSides.bottom, verticalAmount);
            const edgeBias = Math.min(x, y, width - 1 - x, height - 1 - y) / Math.max(width, height);
            const centerWeight = clampNumber(edgeBias * 1.35, 0, 0.32, 0);
            const blended = mixColors(mixColors(horizontal, vertical, 0.46), center, centerWeight);
            const index = (y * width + x) * 4;
            pixels[index] = Math.round(blended.r);
            pixels[index + 1] = Math.round(blended.g);
            pixels[index + 2] = Math.round(blended.b);
            pixels[index + 3] = 255;
          }
        }
        context.putImageData(imageData, 0, 0);
      }

      function paintRepairGradient(context, width, height, sides, center, isFlatBackground) {
        const horizontal = context.createLinearGradient(0, 0, width, 0);
        horizontal.addColorStop(0, `rgba(${toRgb(sides.left)}, ${isFlatBackground ? 0.86 : 0.2})`);
        horizontal.addColorStop(0.48, `rgba(${toRgb(center)}, ${isFlatBackground ? 0.96 : 0.22})`);
        horizontal.addColorStop(1, `rgba(${toRgb(sides.right)}, ${isFlatBackground ? 0.88 : 0.2})`);
        context.fillStyle = horizontal;
        context.fillRect(0, 0, width, height);

        const vertical = context.createLinearGradient(0, 0, 0, height);
        vertical.addColorStop(0, `rgba(${toRgb(sides.top)}, ${isFlatBackground ? 0.32 : 0.1})`);
        vertical.addColorStop(0.58, "rgba(255, 255, 255, 0)");
        vertical.addColorStop(1, `rgba(${toRgb(sides.bottom)}, ${isFlatBackground ? 0.28 : 0.1})`);
        context.fillStyle = vertical;
        context.fillRect(0, 0, width, height);

        const sheen = context.createLinearGradient(0, 0, width, height);
        sheen.addColorStop(0, `rgba(255, 255, 255, ${isFlatBackground ? 0.18 : 0.04})`);
        sheen.addColorStop(0.55, "rgba(255, 255, 255, 0)");
        sheen.addColorStop(1, `rgba(${toRgb(center)}, ${isFlatBackground ? 0.08 : 0.03})`);
        context.fillStyle = sheen;
        context.fillRect(0, 0, width, height);
      }

      function adjustColor(color, amount) {
        return {
          r: clampNumber(color.r + amount, 0, 255, color.r),
          g: clampNumber(color.g + amount, 0, 255, color.g),
          b: clampNumber(color.b + amount, 0, 255, color.b),
          luma: clampNumber(color.luma + amount, 0, 255, color.luma)
        };
      }

      function toRgb(color) {
        return `${Math.round(color.r)}, ${Math.round(color.g)}, ${Math.round(color.b)}`;
      }

      function mixColors(a, b, weight = 0.5) {
        const amount = clampNumber(weight, 0, 1, 0.5);
        const inverse = 1 - amount;
        const color = {
          r: a.r * inverse + b.r * amount,
          g: a.g * inverse + b.g * amount,
          b: a.b * inverse + b.b * amount,
          luma: 0
        };
        color.luma = 0.2126 * color.r + 0.7152 * color.g + 0.0722 * color.b;
        return color;
      }

      function addSoftLightWash(context, width, height, centerRgb, opacity) {
        const radius = Math.max(width, height) * 0.92;
        const glow = context.createRadialGradient(width * 0.42, height * 0.28, 0, width * 0.5, height * 0.44, radius);
        glow.addColorStop(0, `rgba(255, 255, 255, ${opacity})`);
        glow.addColorStop(0.46, `rgba(${centerRgb}, ${opacity * 0.42})`);
        glow.addColorStop(1, "rgba(255, 255, 255, 0)");
        context.fillStyle = glow;
        context.fillRect(0, 0, width, height);
      }

      function addSubtleNoise(context, width, height, opacity) {
        const imageData = context.getImageData(0, 0, width, height);
        const pixels = imageData.data;
        for (let index = 0; index < pixels.length; index += 4) {
          const noise = (Math.random() - 0.5) * 4;
          pixels[index] = clampNumber(pixels[index] + noise, 0, 255, pixels[index]);
          pixels[index + 1] = clampNumber(pixels[index + 1] + noise, 0, 255, pixels[index + 1]);
          pixels[index + 2] = clampNumber(pixels[index + 2] + noise, 0, 255, pixels[index + 2]);
          pixels[index + 3] = Math.round(pixels[index + 3] * (1 - opacity) + 255 * opacity);
        }
        context.putImageData(imageData, 0, 0);
      }

      async function removeEdgeBackground(dataUrl) {
        const source = await loadImageElement(dataUrl);
        const canvas = document.createElement("canvas");
        canvas.width = source.naturalWidth || source.width;
        canvas.height = source.naturalHeight || source.height;
        const context = canvas.getContext("2d", { willReadFrequently: true });
        context.drawImage(source, 0, 0);
        const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
        const pixels = imageData.data;
        const background = sampleEdgeColor(pixels, canvas.width, canvas.height);
        const hardThreshold = 34;
        const softThreshold = 82;

        for (let index = 0; index < pixels.length; index += 4) {
          const distance = colorDistance(
            pixels[index],
            pixels[index + 1],
            pixels[index + 2],
            background.r,
            background.g,
            background.b
          );
          if (distance <= hardThreshold) {
            pixels[index + 3] = 0;
          } else if (distance < softThreshold) {
            const alphaRatio = (distance - hardThreshold) / (softThreshold - hardThreshold);
            pixels[index + 3] = Math.round(pixels[index + 3] * alphaRatio);
          }
        }

        context.putImageData(imageData, 0, 0);
        return canvas.toDataURL("image/png");
      }

      async function rasterAssetToEditableSvg(dataUrl, fallbackWidth, fallbackHeight) {
        const source = await loadImageElement(dataUrl);
        const sourceWidth = source.naturalWidth || source.width || fallbackWidth;
        const sourceHeight = source.naturalHeight || source.height || fallbackHeight;
        const width = Math.max(1, Math.round(fallbackWidth || sourceWidth));
        const height = Math.max(1, Math.round(fallbackHeight || sourceHeight));
        const backendSvg = await vectorizeAssetWithBackend(dataUrl, width, height);
        if (backendSvg) {
          return backendSvg;
        }

        const tracer = window.ImageTracer;
        if (!tracer || typeof tracer.imagedataToSVG !== "function") {
          throw new Error("SVG 转换引擎未加载");
        }

        const maxSampleSize = 420;
        const scale = Math.min(1, maxSampleSize / Math.max(sourceWidth, sourceHeight));
        const sampleWidth = Math.max(1, Math.round(sourceWidth * scale));
        const sampleHeight = Math.max(1, Math.round(sourceHeight * scale));
        const canvas = document.createElement("canvas");
        canvas.width = sampleWidth;
        canvas.height = sampleHeight;
        const context = canvas.getContext("2d", { willReadFrequently: true });
        context.imageSmoothingEnabled = true;
        context.imageSmoothingQuality = "high";
        context.drawImage(source, 0, 0, sampleWidth, sampleHeight);
        const imageData = context.getImageData(0, 0, sampleWidth, sampleHeight);
        const traceScale = width / sampleWidth;
        const svg = tracer.imagedataToSVG(imageData, {
          ltres: 0.5,
          qtres: 0.5,
          pathomit: 8,
          rightangleenhance: false,
          colorsampling: 2,
          numberofcolors: 18,
          mincolorratio: 0.01,
          colorquantcycles: 3,
          layering: 0,
          strokewidth: 0,
          linefilter: true,
          scale: traceScale,
          roundcoords: 1,
          viewbox: false,
          desc: false,
          blurradius: 0,
          blurdelta: 20
        });

        const pathCount = (svg.match(/<path/g) || []).length;
        if (!pathCount) {
          throw new Error("没有检测到可转换的 SVG 路径");
        }
        if (pathCount > 700) {
          throw new Error("路径过多，这个素材更适合保留 PNG");
        }

        return normalizeVectorSvg(svg, width, height);
      }

      async function vectorizeAssetWithBackend(dataUrl, width, height) {
        try {
          const response = await fetch(`${PROXY_BASE_URL}/api/assets/vectorize`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ dataUrl, width, height })
          });
          const result = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(result.error || `VTracer 转换失败：${response.status}`);
          }
          if (!result.svg) {
            throw new Error("VTracer 没有返回 SVG");
          }
          return normalizeVectorSvg(result.svg, width, height);
        } catch (error) {
          console.warn("VTracer SVG conversion failed, falling back to ImageTracerJS.", error);
          return null;
        }
      }

      function normalizeVectorSvg(svg, width, height) {
        const openTagMatch = svg.match(/<svg\b[^>]*>/);
        if (!openTagMatch) {
          throw new Error("SVG 生成失败");
        }
        const openTag = openTagMatch[0];
        const normalizedOpenTag = openTag
          .replace(/\swidth="[^"]*"/, "")
          .replace(/\sheight="[^"]*"/, "")
          .replace(/\sviewBox="[^"]*"/, "")
          .replace("<svg", `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}"`);
        return svg.replace(openTag, normalizedOpenTag);
      }

      function traceRasterMaskToSvgPaths(pixels, width, height) {
        const background = sampleEdgeColor(pixels, width, height);
        const mask = [];
        let r = 0;
        let g = 0;
        let b = 0;
        let count = 0;
        for (let y = 0; y < height; y += 1) {
          for (let x = 0; x < width; x += 1) {
            const index = (y * width + x) * 4;
            const alpha = pixels[index + 3];
            const distance = colorDistance(pixels[index], pixels[index + 1], pixels[index + 2], background.r, background.g, background.b);
            const isForeground = alpha > 40 && (alpha < 245 || distance > 30);
            mask[y * width + x] = isForeground;
            if (isForeground) {
              r += pixels[index];
              g += pixels[index + 1];
              b += pixels[index + 2];
              count += 1;
            }
          }
        }

        const edgeMap = new Map();
        const addEdge = (x1, y1, x2, y2) => {
          const key = `${x1},${y1}`;
          if (!edgeMap.has(key)) {
            edgeMap.set(key, []);
          }
          edgeMap.get(key).push({ x: x2, y: y2 });
        };
        const hasPixel = (x, y) => x >= 0 && y >= 0 && x < width && y < height && mask[y * width + x];
        for (let y = 0; y < height; y += 1) {
          for (let x = 0; x < width; x += 1) {
            if (!hasPixel(x, y)) {
              continue;
            }
            if (!hasPixel(x, y - 1)) {
              addEdge(x, y, x + 1, y);
            }
            if (!hasPixel(x + 1, y)) {
              addEdge(x + 1, y, x + 1, y + 1);
            }
            if (!hasPixel(x, y + 1)) {
              addEdge(x + 1, y + 1, x, y + 1);
            }
            if (!hasPixel(x - 1, y)) {
              addEdge(x, y + 1, x, y);
            }
          }
        }

        const paths = [];
        while (edgeMap.size) {
          const startKey = edgeMap.keys().next().value;
          const [startX, startY] = startKey.split(",").map(Number);
          const points = [{ x: startX, y: startY }];
          let current = { x: startX, y: startY };
          let guard = 0;
          while (guard < width * height * 8) {
            guard += 1;
            const key = `${current.x},${current.y}`;
            const nextList = edgeMap.get(key);
            if (!nextList || !nextList.length) {
              break;
            }
            const next = nextList.pop();
            if (!nextList.length) {
              edgeMap.delete(key);
            }
            points.push(next);
            current = next;
            if (current.x === startX && current.y === startY) {
              break;
            }
          }
          if (points.length > 3) {
            paths.push(simplifySvgPoints(points, 1.2));
          }
        }

        return {
          fill: count ? rgbToHex(Math.round(r / count), Math.round(g / count), Math.round(b / count)) : "#111318",
          paths
        };
      }

      function pointsToSvgPath(points, scaleX, scaleY) {
        if (!points.length) {
          return "";
        }
        const [first, ...rest] = points;
        return `M${formatSvgNumber(first.x * scaleX)} ${formatSvgNumber(first.y * scaleY)}${rest.map((point) => `L${formatSvgNumber(point.x * scaleX)} ${formatSvgNumber(point.y * scaleY)}`).join("")}Z`;
      }

      function simplifySvgPoints(points, tolerance) {
        if (points.length <= 3) {
          return points;
        }
        const closed = points[0].x === points[points.length - 1].x && points[0].y === points[points.length - 1].y;
        const line = closed ? points.slice(0, -1) : points;
        const simplified = simplifyPolyline(line, tolerance);
        return closed ? [...simplified, simplified[0]] : simplified;
      }

      function simplifyPolyline(points, tolerance) {
        if (points.length <= 2) {
          return points;
        }
        let maxDistance = 0;
        let splitIndex = 0;
        const first = points[0];
        const last = points[points.length - 1];
        for (let index = 1; index < points.length - 1; index += 1) {
          const distance = pointLineDistance(points[index], first, last);
          if (distance > maxDistance) {
            maxDistance = distance;
            splitIndex = index;
          }
        }
        if (maxDistance <= tolerance) {
          return [first, last];
        }
        const before = simplifyPolyline(points.slice(0, splitIndex + 1), tolerance);
        const after = simplifyPolyline(points.slice(splitIndex), tolerance);
        return before.slice(0, -1).concat(after);
      }

      function pointLineDistance(point, start, end) {
        const dx = end.x - start.x;
        const dy = end.y - start.y;
        if (dx === 0 && dy === 0) {
          return Math.hypot(point.x - start.x, point.y - start.y);
        }
        return Math.abs(dy * point.x - dx * point.y + end.x * start.y - end.y * start.x) / Math.hypot(dx, dy);
      }

      function rgbToHex(r, g, b) {
        return `#${[r, g, b].map((value) => clampNumber(value, 0, 255, 0).toString(16).padStart(2, "0")).join("")}`;
      }

      function formatSvgNumber(value) {
        return Number(value.toFixed(2)).toString();
      }

      function sampleEdgeStats(pixels, width, height) {
        const sideSamples = {
          top: [],
          right: [],
          bottom: [],
          left: []
        };
        const step = Math.max(1, Math.floor(Math.min(width, height) / 18));
        for (let x = 0; x < width; x += step) {
          sideSamples.top.push(getPixelColor(pixels, width, x, 0));
          sideSamples.bottom.push(getPixelColor(pixels, width, x, height - 1));
        }
        for (let y = 0; y < height; y += step) {
          sideSamples.left.push(getPixelColor(pixels, width, 0, y));
          sideSamples.right.push(getPixelColor(pixels, width, width - 1, y));
        }
        const samples = [
          ...sideSamples.top,
          ...sideSamples.right,
          ...sideSamples.bottom,
          ...sideSamples.left
        ].sort((a, b) => a.luma - b.luma);
        const start = Math.floor(samples.length * 0.2);
        const end = Math.max(start + 1, Math.ceil(samples.length * 0.8));
        const middleSamples = samples.slice(start, end);
        const color = averageColors(middleSamples);
        const variance = middleSamples.reduce((sum, sample) => {
          const distance = colorDistance(sample.r, sample.g, sample.b, color.r, color.g, color.b);
          return sum + distance * distance;
        }, 0) / middleSamples.length;
        return {
          color,
          variance,
          sides: {
            top: averageColors(sideSamples.top, color),
            right: averageColors(sideSamples.right, color),
            bottom: averageColors(sideSamples.bottom, color),
            left: averageColors(sideSamples.left, color)
          }
        };
      }

      function averageColors(samples, fallback = { r: 244, g: 246, b: 250, luma: 246 }) {
        if (!samples.length) {
          return fallback;
        }
        const total = samples.reduce(
          (sum, color) => ({
            r: sum.r + color.r,
            g: sum.g + color.g,
            b: sum.b + color.b
          }),
          { r: 0, g: 0, b: 0 }
        );
        const color = {
          r: total.r / samples.length,
          g: total.g / samples.length,
          b: total.b / samples.length,
          luma: 0
        };
        color.luma = 0.2126 * color.r + 0.7152 * color.g + 0.0722 * color.b;
        return color;
      }

      function averageBackgroundColors(samples, fallback = { r: 244, g: 246, b: 250, luma: 246 }) {
        if (!samples.length) {
          return fallback;
        }
        const bySaturation = [...samples].sort((a, b) => a.saturation - b.saturation);
        const lowSaturationCount = Math.max(6, Math.ceil(bySaturation.length * 0.68));
        const backgroundCandidates = bySaturation.slice(0, lowSaturationCount).sort((a, b) => a.luma - b.luma);
        const start = Math.floor(backgroundCandidates.length * 0.12);
        const end = Math.max(start + 1, Math.ceil(backgroundCandidates.length * 0.88));
        return averageColors(backgroundCandidates.slice(start, end), fallback);
      }

      function sampleEdgeColor(pixels, width, height) {
        return sampleEdgeStats(pixels, width, height).color;
      }

      function getPixelColor(pixels, width, x, y) {
        const index = (y * width + x) * 4;
        const r = pixels[index];
        const g = pixels[index + 1];
        const b = pixels[index + 2];
        return {
          r,
          g,
          b,
          luma: 0.2126 * r + 0.7152 * g + 0.0722 * b,
          saturation: Math.max(r, g, b) - Math.min(r, g, b)
        };
      }

      function colorDistance(r1, g1, b1, r2, g2, b2) {
        const dr = r1 - r2;
        const dg = g1 - g2;
        const db = b1 - b2;
        return Math.sqrt(dr * dr + dg * dg + db * db);
      }

      async function buildPlacementManifest(manifest) {
        const activeImage = getActiveResultImage();
        ensureImageSliceState(activeImage);
        const assets = activeImage?.sliceManifest?.assets || [];
        const previewDataUrl = await createRepairedPreviewImage(activeImage);
        return {
          ...manifest,
          previewImage: { dataUrl: previewDataUrl || activeImage?.dataUrl || manifest.previewImage.dataUrl },
          assets
        };
      }

      function openPlaceDialog() {
        if (!currentManifest) {
          return;
        }
        placeDialog.classList.add("open");
      }

      function closePlaceDialog() {
        placeDialog.classList.remove("open");
      }

      async function placeSourceInFigma() {
        if (!currentManifest) {
          return;
        }
        if (!isEmbeddedPluginHost()) {
          setStatus("当前是直接打开的 ui.html 页面；“放入 Figma”只有在 Figma 插件窗口或模拟器里才会创建画布。", true);
          return;
        }

        setBusy(true, "正在准备源文件回填到 Figma...");
        let placementManifest;
        try {
          placementManifest = await buildPlacementManifest(currentManifest);
        } catch (error) {
          setBusy(false);
          setStatus(`放入 Figma 失败：${error.message || String(error)}`, true);

        }

        parent.postMessage(
          {
            pluginMessage: {
              type: "create-ui-asset-screen",
              manifest: placementManifest
            }
          },
          "*"
        );

        setStatus("已按源文件方式发送到 Figma 画布。");
      }

      async function placeEditableDesignInFigma() {
        if (!currentManifest) {
          return;
        }
        if (!isEmbeddedPluginHost()) {
          setStatus("当前是直接打开的 ui.html 页面；“可编辑设计稿”只有在 Figma 插件窗口或模拟器里才会创建画布。", true);
          return;
        }

        setBusy(true, "正在生成可编辑设计稿实验图层...");
        try {
          const manifest = await buildEditableDesignManifest();
          parent.postMessage(
            {

                type: "create-editable-design-screen",
                manifest
              }
            },
            "*"
          );
          setStatus("已发送可编辑设计稿实验图层到 Figma。");
        } catch (error) {
          setStatus(`可编辑设计稿导入失败：${error.message || String(error)}`, true);
        } finally {

        }
      }

      async function previewEditableDesignHtml() {
        if (!currentManifest) {
          return;
        }
        setBusy(true, "正在生成编辑设计稿预览...");
        try {
          const result = await requestEditableDesignHtmlPreview();
          if (!result.html) {
            throw new Error("后端没有返回编辑设计稿预览");
          }
          openHtmlPreview(result);
          if (result.warning) {
            setStatus(result.warning, true);
          } else {
            const assetCount = Number(result.metadata?.referenceAssetCount || 0);
            setStatus(`已打开编辑设计稿预览，已带入 ${assetCount} 个切图资产。`);
          }
        } catch (error) {
          setStatus(`编辑设计稿预览失败：${error.message || String(error)}`, true);
        } finally {
          setBusy(false);
        }
      }

      function openHtmlPreview(result) {
        const rawHtml = typeof result === "string" ? result : result.html;
        const referenceAssets = typeof result === "string" ? [] : (result.referenceAssets || []);
        const html = sanitizeHtmlPreviewForDisplay(hydrateHtmlPreviewReferenceAssets(rawHtml, referenceAssets));
        activeHtmlPreviewResult = typeof result === "string" ? { html } : result;
        activeHtmlPreviewResult.html = html;
        htmlPreviewImport.disabled = true;
        htmlPreviewImport.title = isEmbeddedPluginHost() ? "把当前预览捕获为 Figma 可编辑图层" : "只有在 Figma 插件或模拟器里才能导入";
        htmlPreviewFrame.srcdoc = html;
        htmlPreviewDialog.classList.add("open");
      }

      function sanitizeHtmlPreviewForDisplay(html) {
        return String(html || "").replace(/<img\b[^>]*>/gi, (tag) => {
          const srcMatch = tag.match(/\ssrc\s*=\s*(?:"([^"]*)"|'([^']*)'|([^\s>]+))/i);
          const src = (srcMatch?.[1] || srcMatch?.[2] || srcMatch?.[3] || "").trim();
          return isFigmaImageDataUrl(src) || isSvgDataUrl(src) ? tag : "";
        });
      }

      function hydrateHtmlPreviewReferenceAssets(html, referenceAssets = []) {
        if (!referenceAssets.length) {
          return String(html || "");
        }
        let nextHtml = String(html || "");
        const assetMap = new Map(referenceAssets.map((asset) => [String(asset.id || ""), asset]));
        nextHtml = nextHtml.replace(/(<img\b[^>]*\bdata-reference-asset=(["'])(.*?)\2[^>]*>)/gi, (tag, _full, _quote, id) => {
          const asset = assetMap.get(String(id || ""));
          if (!asset?.dataUrl) {
            return tag;
          }
          if (/\ssrc\s*=/i.test(tag)) {
            return tag.replace(/\ssrc\s*=\s*(?:"[^"]*"|'[^']*'|[^\s>]+)/i, ` src="${asset.dataUrl}"`);
          }
          return tag.replace(/<img/i, `<img src="${asset.dataUrl}"`);
        });
        return nextHtml;
      }

      function cleanupHtmlPreviewImages() {
        const doc = htmlPreviewFrame.contentDocument;
        if (!doc) {
          return;
        }
        for (const image of [...doc.querySelectorAll("img")]) {
          const src = image.currentSrc || image.getAttribute("src") || "";
          if (!isFigmaImageDataUrl(src)) {
            image.remove();
            continue;
          }
          image.addEventListener("error", () => image.remove(), { once: true });
        }
      }

      function closeHtmlPreview() {
        htmlPreviewDialog.classList.remove("open");
        htmlPreviewFrame.srcdoc = "";
        activeHtmlPreviewResult = null;
        htmlPreviewImport.disabled = true;
      }

      async function importHtmlPreviewToFigma() {
        if (!currentManifest) {
          return;
        }
        if (!isEmbeddedPluginHost()) {
          setStatus("当前是直接打开的 ui.html 页面；导入 H5 只有在 Figma 插件窗口或模拟器里才会创建画布。", true);
          return;
        }
        if (!activeHtmlPreviewResult?.html) {
          setStatus("请先打开编辑设计稿预览。", true);
          return;
        }

        setBusy(true, "正在捕获 H5 DOM 并导入 Figma...");
        try {
          const manifest = sanitizeEditableManifestForFigma(await captureHtmlPreviewAsEditableManifest());
          parent.postMessage(
            {
              pluginMessage: {
                type: "create-editable-design-screen",
                manifest
              }
            },
            "*"
          );
          setStatus("已按 web-to-figma 思路捕获 H5 DOM，并发送到 Figma。");
        } catch (error) {
          setStatus(`H5 导入 Figma 失败：${error.message || String(error)}`, true);
        } finally {
          setBusy(false);
        }
      }

      function sanitizeEditableManifestForFigma(manifest) {
        if (!manifest || typeof manifest !== "object") {
          return manifest;
        }
        const dropped = [];
        const sanitizeNode = (node) => {
          if (!node || typeof node !== "object") {
            return null;
          }
          const type = String(node.type || "").toLowerCase();
          if (type === "image" && !isFigmaImageDataUrl(node.dataUrl)) {
            dropped.push(node.name || "image");
            return null;
          }
          if (type === "svg" && !String(node.svgData || "").trim()) {
            dropped.push(node.name || "svg");
            return null;
          }
          if (Array.isArray(node.children)) {
            node.children = node.children.map(sanitizeNode).filter(Boolean);
          }
          return node;
        };
        const nodes = (manifest.nodes || []).map(sanitizeNode).filter(Boolean);
        return {
          ...manifest,
          metadata: {
            ...(manifest.metadata || {}),
            droppedInvalidImageNodes: dropped.length
          },
          nodes
        };
      }

      async function captureHtmlPreviewAsEditableManifest() {
        try {
          const capture = await captureHtmlPreviewWithWebToFigma();
          return mapWebToFigmaCaptureToEditableManifest(capture);
        } catch (error) {
          console.warn("web-to-figma capture failed, falling back to local capture.", error);
          const manifest = captureHtmlPreviewAsEditableManifestFallback();
          manifest.metadata = {
            ...manifest.metadata,
            webToFigmaFallback: true,
            webToFigmaError: error?.message || String(error)
          };
          return manifest;
        }
      }

      async function captureHtmlPreviewWithWebToFigma() {
        const doc = htmlPreviewFrame.contentDocument;
        if (!doc) {
          throw new Error("无法读取编辑设计稿预览 iframe");
        }
        const screenElement = doc.querySelector(".screen") || doc.body;
        if (!screenElement) {
          throw new Error("编辑设计稿预览里没有可捕获的画板");
        }
        await ensureWebToFigmaCaptureRuntime(doc);
        const rawCapture = await doc.defaultView.figma.captureRawForDesign(".screen");
        const capture = typeof rawCapture === "string" ? JSON.parse(rawCapture) : rawCapture;
        if (!capture?.root?.rect) {
          throw new Error("web-to-figma 没有返回有效 DOM 捕获数据");
        }
        return capture;
      }

      async function ensureWebToFigmaCaptureRuntime(doc) {
        const win = doc.defaultView;
        if (win?.figma?.captureRawForDesign) {
          return;
        }
        const runtime = document.getElementById("webToFigmaCaptureRuntime")?.textContent;
        if (!runtime) {
          throw new Error("web-to-figma capture runtime 未加载");
        }
        const script = doc.createElement("script");
        script.textContent = runtime;
        doc.documentElement.appendChild(script);
        script.remove();
        await new Promise((resolve) => win.requestAnimationFrame(() => resolve()));
        if (!win.figma?.captureRawForDesign) {
          throw new Error("web-to-figma capture runtime 初始化失败");
        }
      }

      function mapWebToFigmaCaptureToEditableManifest(capture) {
        const root = capture.root;
        const rootRect = root.rect;
        const targetWidth = currentManifest.screen.width;
        const targetHeight = currentManifest.screen.height;
        const scaleX = targetWidth / rootRect.width;
        const scaleY = targetHeight / rootRect.height;
        const nodes = [];
        const assets = capture.assets || {};
        const seenReferenceAssetIds = new Set();
        const rootFill = extractSolidCssColor(root.styles?.backgroundColor) || "#F7F8FA";
        const rootGradient = parseCssGradient(readCssBackground(root.styles));

        const pushNode = (node) => {
          if (!node || nodes.length >= 260) {
            return;
          }
          if (node.width < 1 || node.height < 1) {
            return;
          }
          if (node.x > targetWidth || node.y > targetHeight || node.x + node.width < 0 || node.y + node.height < 0) {
            return;
          }
          nodes.push(node);
        };

        const toBox = (rect) => {
          if (!rect || !rect.width || !rect.height) {
            return null;
          }
          return {
            x: Math.round((rect.x - rootRect.x) * scaleX),
            y: Math.round((rect.y - rootRect.y) * scaleY),
            width: Math.round(rect.width * scaleX),
            height: Math.round(rect.height * scaleY)
          };
        };

        const visit = (node, parent = null) => {
          if (!node) {
            return;
          }
          if (node.nodeType === 3) {
            const text = String(node.text || "").replace(/\s+/g, " ").trim();
            const style = parent?.styles || {};
            const box = toBox(node.rect);
            if (text && box) {
              const fontSize = Number.parseFloat(style.fontSize || "16");
              const arrowIconName = inferArrowIconFromText(text);
              if (arrowIconName) {
                const iconSize = Math.max(
                  8,
                  Math.round(Math.max(box.width, box.height, fontSize * Math.max(scaleX, scaleY)))
                );
                pushNode({
                  type: "icon",
                  name: safeLayerName(`web_${arrowIconName}`),
                  iconName: arrowIconName,
                  x: box.x,
                  y: box.y,
                  width: Math.max(box.width, iconSize),
                  height: Math.max(box.height, iconSize),
                  color: extractSolidCssColor(style.color) || "#111318",
                  opacity: clampNumber(Number(style.opacity), 0.05, 1, 1),
                  strokeWidth: Math.max(1.5, Math.min(3.5, iconSize * 0.09))
                });
              } else {
                pushNode({
                  type: "text",
                  name: safeLayerName(parent?.owningReactComponent || parent?.tag || "web_text"),
                  text: text.length > 160 ? `${text.slice(0, 157)}...` : text,
                  x: box.x,
                  y: box.y,
                  width: box.width,
                  height: box.height,
                  fontSize: Math.max(8, Math.round(fontSize * scaleY)),
                  fontWeight: normalizeCssFontWeight(style.fontWeight || "400"),
                  lineHeight: Math.max(10, Math.round(parseCssLineHeight(style, fontSize) * scaleY)),
                  color: extractSolidCssColor(style.color) || "#111318",
                  opacity: clampNumber(Number(style.opacity), 0.05, 1, 1)
                });
              }
            }
            return;
          }
          if (node.nodeType !== 1) {
            return;
          }
          const style = node.styles || {};
          if (style.display === "none" || style.visibility === "hidden" || Number(style.opacity || 1) <= 0.01) {
            return;
          }
          const isRoot = node === root;
          const box = toBox(node.rect);
          if (!isRoot && box) {
            const tag = String(node.tag || "").toLowerCase();
            const referenceAssetId = getWebToFigmaReferenceAssetId(node);
            if (referenceAssetId) {
              seenReferenceAssetIds.add(referenceAssetId);
            }
            const imageUrl = getWebToFigmaElementImageUrl(node, assets);
            if (isSvgDataUrl(imageUrl)) {
              pushNode({
                type: "svg",
                name: safeLayerName(node.attributes?.alt || node.attributes?.id || referenceAssetId || node.owningReactComponent || tag || "web_svg"),
                svgData: decodeSvgDataUrl(imageUrl),
                x: box.x,
                y: box.y,
                width: box.width,
                height: box.height,
                radius: scaleWebToFigmaRadius(style, scaleX, scaleY),
                radii: scaleWebToFigmaRadii(style, scaleX, scaleY),
                sourceAssetId: referenceAssetId || undefined
              });
            } else if (isFigmaImageDataUrl(imageUrl)) {
              pushNode({
                type: "image",
                name: safeLayerName(node.attributes?.alt || node.attributes?.id || referenceAssetId || node.owningReactComponent || tag || "web_image"),
                dataUrl: imageUrl,
                x: box.x,
                y: box.y,
                width: box.width,
                height: box.height,
                radius: scaleWebToFigmaRadius(style, scaleX, scaleY),
                radii: scaleWebToFigmaRadii(style, scaleX, scaleY),
                scaleMode: cssImageScaleMode(style, referenceAssetId),
                sourceAssetId: referenceAssetId || undefined
              });
            } else if (tag === "svg" && node.content) {
              pushNode({
                type: "svg",
                name: safeLayerName(node.attributes?.id || node.owningReactComponent || "web_svg"),
                svgData: node.content,
                x: box.x,
                y: box.y,
                width: box.width,
                height: box.height,
                radius: scaleWebToFigmaRadius(style, scaleX, scaleY),
                radii: scaleWebToFigmaRadii(style, scaleX, scaleY),
                sourceAssetId: referenceAssetId || undefined
              });
            } else {
              const background = extractSolidCssColor(style.backgroundColor);
              const gradient = parseCssGradient(readCssBackground(style));
              const borderWidth = Math.max(0, Number.parseFloat(style.borderTopWidth || "0"));
              const borderColor = borderWidth > 0 ? extractSolidCssColor(style.borderTopColor) : "";
              const hasShadow = style.boxShadow && style.boxShadow !== "none";
              if (background || gradient || borderColor || hasShadow) {
                pushNode({
                  type: "rect",
                  name: safeLayerName(node.attributes?.id || node.owningReactComponent || tag || "web_shape"),
                  x: box.x,
                  y: box.y,
                  width: box.width,
                  height: box.height,
                  radius: scaleWebToFigmaRadius(style, scaleX, scaleY),
                  radii: scaleWebToFigmaRadii(style, scaleX, scaleY),
                  fill: background || "#FFFFFF",
                  gradient,
                  opacity: clampNumber(Number(style.opacity), 0.05, 1, 1),
                  stroke: borderColor || undefined,
                  strokeWidth: borderColor ? Math.max(1, Math.round(borderWidth * scaleX)) : undefined,
                  shadow: hasShadow ? parseCssBoxShadow(style.boxShadow, scaleY) : undefined
                });
              }
            }
          }
          for (const child of node.childNodes || []) {
            visit(child, node);
          }
        };

        visit(root);
        appendMissingReferenceAssetNodes(pushNode, seenReferenceAssetIds);
        const sourceImage = getActiveResultImage()?.dataUrl
          ? {
              dataUrl: getActiveResultImage().dataUrl,
              name: "source_image_reference.png"
            }
          : null;

        return {
          version: "editable-design-experiment-0.4",
          metadata: {
            mode: "web-to-figma-capture-adapter",
            source: "h5-preview",
            nodeCount: nodes.length,
            previewWidth: Math.round(rootRect.width),
            previewHeight: Math.round(rootRect.height),
            upstream: "Paidax01/web-to-figma capture.js"
          },
          screen: {
            name: "editable_design_web_to_figma_capture",
            width: targetWidth,
            height: targetHeight,
            fill: rootFill,
            gradient: rootGradient,
            clipsContent: true
          },
          sourceImage,
          nodes: nodes.slice(0, 240)
        };
      }

      function getWebToFigmaElementImageUrl(node, assets) {
        const tag = String(node.tag || "").toLowerCase();
        const attrs = node.attributes || {};
        if (tag === "img") {
          return resolveWebToFigmaAssetDataUrl(attrs.currentSrc || attrs.src || "", assets);
        }
        const backgroundUrl = extractCssUrl(readCssBackground(node.styles));
        if (backgroundUrl) {
          return resolveWebToFigmaAssetDataUrl(backgroundUrl, assets);
        }
        return "";
      }

      function getWebToFigmaReferenceAssetId(node) {
        const attrs = node?.attributes || {};
        return String(
          attrs["data-reference-asset"] ||
          attrs.dataReferenceAsset ||
          attrs["data-asset-id"] ||
          attrs.dataAssetId ||
          ""
        ).trim();
      }

      function readCssBackground(style) {
        if (!style) {
          return "";
        }
        return [
          style.backgroundImage,
          style.background,
          style.backgroundColor
        ].filter(Boolean).join(", ");
      }

      function resolveWebToFigmaAssetDataUrl(url, assets) {
        const value = String(url || "").trim();
        if (!value || /^(?:linear|radial)-gradient\(/i.test(value)) {
          return "";
        }
        if (isFigmaImageDataUrl(value) || isSvgDataUrl(value)) {
          return value;
        }
        return normalizeWebToFigmaAssetDataUrl(findWebToFigmaAsset(value, assets));
      }

      function isFigmaImageDataUrl(value) {
        return /^data:image\/(?:png|jpeg|jpg);base64,/i.test(String(value || "").trim());
      }

      function isSvgDataUrl(value) {
        return /^data:image\/svg\+xml(?:;charset=[^;,]+)?(?:;base64)?,/i.test(String(value || "").trim());
      }

      function decodeSvgDataUrl(value) {
        const text = String(value || "").trim();
        const commaIndex = text.indexOf(",");
        if (commaIndex < 0) {
          return "";
        }
        const meta = text.slice(0, commaIndex).toLowerCase();
        const payload = text.slice(commaIndex + 1);
        try {
          return meta.includes(";base64")
            ? decodeURIComponent(escape(atob(payload)))
            : decodeURIComponent(payload);
        } catch (error) {
          return "";
        }
      }

      function findWebToFigmaAsset(url, assets) {
        if (!assets || !url) {
          return null;
        }
        const candidates = new Set([
          url,
          decodeURIComponentSafe(url),
          stripCssUrlQuotes(url)
        ]);
        try {
          const resolved = new URL(url, htmlPreviewFrame.contentWindow?.location?.href || window.location.href);
          candidates.add(resolved.href);
          candidates.add(resolved.pathname);
          candidates.add(resolved.pathname.split("/").pop());
        } catch (error) {
          // Relative or synthetic asset URLs are still handled by direct lookup.
        }
        for (const key of candidates) {
          if (key && assets[key]) {
            return assets[key];
          }
        }
        for (const [key, asset] of Object.entries(assets)) {
          const normalizedKey = stripCssUrlQuotes(decodeURIComponentSafe(key));
          if (candidates.has(normalizedKey) || [...candidates].some((candidate) => candidate && normalizedKey.endsWith(candidate))) {
            return asset;
          }
        }
        return null;
      }

      function normalizeWebToFigmaAssetDataUrl(asset) {
        if (!asset) {
          return "";
        }
        const candidates = [
          asset.dataUrl,
          asset.dataURL,
          asset.base64Blob,
          asset.blob?.dataUrl,
          asset.blob?.dataURL,
          asset.blob?.base64Blob,
          asset.blob,
          asset
        ];
        const mimeType =
          asset.mimeType ||
          asset.type ||
          asset.blob?.type ||
          asset.contentType ||
          "image/png";
        for (const candidate of candidates) {
          if (typeof candidate !== "string") {
            continue;
          }
          const value = candidate.trim();
          if (isFigmaImageDataUrl(value) || isSvgDataUrl(value)) {
            return value;
          }
          if (/^[A-Za-z0-9+/=\s]+$/.test(value) && value.length > 80) {
            const mime = /svg/i.test(mimeType) ? "image/svg+xml" : (/jpe?g/i.test(mimeType) ? "image/jpeg" : "image/png");
            return `data:${mime};base64,${value.replace(/\s+/g, "")}`;
          }
        }
        return "";
      }

      function stripCssUrlQuotes(value) {
        return String(value || "").trim().replace(/^['"]|['"]$/g, "");
      }

      function decodeURIComponentSafe(value) {
        try {
          return decodeURIComponent(String(value || ""));
        } catch (error) {
          return String(value || "");
        }
      }

      function appendMissingReferenceAssetNodes(pushNode, seenReferenceAssetIds) {
        const activeImage = getActiveResultImage();
        const assetList = activeImage?.sliceManifest?.assets || [];
        for (const asset of assetList) {
          if (!asset?.placement || asset.selected === false || seenReferenceAssetIds.has(String(asset.id || ""))) {
            continue;
          }
          const p = asset.placement;
          const node = {
            type: asset.svgData ? "svg" : "image",
            name: safeLayerName(asset.name || asset.id || "reference_asset"),
            x: Math.round(Number(p.x || 0)),
            y: Math.round(Number(p.y || 0)),
            width: Math.max(1, Math.round(Number(p.width || 1))),
            height: Math.max(1, Math.round(Number(p.height || 1))),
            radius: getSliceRadius(asset),
            scaleMode: "FIT",
            sourceAssetId: asset.id
          };
          if (asset.svgData) {
            node.svgData = asset.svgData;
          } else if (isFigmaImageDataUrl(asset.dataUrl)) {
            node.dataUrl = asset.dataUrl;
          } else {
            continue;
          }
          pushNode(node);
        }
      }

      function extractCssUrl(value) {
        const text = String(value || "").trim();
        if (!text || text === "none") {
          return "";
        }
        const match = text.match(/url\(\s*(["']?)(.*?)\1\s*\)/i);
        return match?.[2] || "";
      }

      function svgTextToDataUrl(svgText) {
        const text = String(svgText || "").trim();
        return `data:image/svg+xml;base64,${btoa(unescape(encodeURIComponent(text)))}`;
      }

      function scaleWebToFigmaRadius(style, scaleX, scaleY) {
        const radius =
          style.borderRadius ||
          style.borderTopLeftRadius ||
          style.borderTopRightRadius ||
          style.borderBottomRightRadius ||
          style.borderBottomLeftRadius ||
          "0";
        return scaleCssRadius(radius, scaleX, scaleY);
      }

      function scaleWebToFigmaRadii(style, scaleX, scaleY) {
        if (!style) {
          return null;
        }
        const radii = {
          topLeft: scaleCssRadius(style.borderTopLeftRadius || style.borderRadius || "0", scaleX, scaleY),
          topRight: scaleCssRadius(style.borderTopRightRadius || style.borderRadius || "0", scaleX, scaleY),
          bottomRight: scaleCssRadius(style.borderBottomRightRadius || style.borderRadius || "0", scaleX, scaleY),
          bottomLeft: scaleCssRadius(style.borderBottomLeftRadius || style.borderRadius || "0", scaleX, scaleY)
        };
        const values = Object.values(radii);
        return values.some((value) => value !== values[0]) ? radii : null;
      }

      function cssImageScaleMode(style, referenceAssetId) {
        if (referenceAssetId) {
          return "FIT";
        }
        const objectFit = String(style?.objectFit || "").toLowerCase();
        const backgroundSize = String(style?.backgroundSize || "").toLowerCase();
        if (objectFit === "contain" || backgroundSize.includes("contain")) {
          return "FIT";
        }
        if (objectFit === "cover" || backgroundSize.includes("cover")) {
          return "FILL";
        }
        return "FIT";
      }

      function captureHtmlPreviewAsEditableManifestFallback() {
        const doc = htmlPreviewFrame.contentDocument;
        if (!doc) {
          throw new Error("无法读取编辑设计稿预览 iframe");
        }
        const screenElement = doc.querySelector(".screen") || doc.body;
        if (!screenElement) {
          throw new Error("编辑设计稿预览里没有可捕获的画板");
        }
        const screenRect = screenElement.getBoundingClientRect();
        if (!screenRect.width || !screenRect.height) {
          throw new Error("编辑设计稿预览画板尺寸无效");
        }
        const targetWidth = currentManifest.screen.width;
        const targetHeight = currentManifest.screen.height;
        const scaleX = targetWidth / screenRect.width;
        const scaleY = targetHeight / screenRect.height;
        const nodes = [];
        const screenStyle = doc.defaultView.getComputedStyle(screenElement);
        const screenFill = extractSolidCssColor(screenStyle.backgroundColor) || "#F7F8FA";
        const screenGradient = parseCssGradient(readCssBackground(screenStyle));

        const elements = [...screenElement.querySelectorAll("*")].slice(0, 260);
        for (const element of elements) {
          const style = doc.defaultView.getComputedStyle(element);
          if (style.display === "none" || style.visibility === "hidden" || Number(style.opacity || 1) <= 0.01) {
            continue;
          }
          const rect = element.getBoundingClientRect();
          if (!rect.width || !rect.height) {
            continue;
          }
          const box = {
            x: Math.round((rect.left - screenRect.left) * scaleX),
            y: Math.round((rect.top - screenRect.top) * scaleY),
            width: Math.round(rect.width * scaleX),
            height: Math.round(rect.height * scaleY)
          };
          if (box.width < 1 || box.height < 1 || box.x > targetWidth || box.y > targetHeight) {
            continue;
          }

          const tag = element.tagName.toLowerCase();
          if (tag === "img") {
            const src = element.getAttribute("src") || "";
            if (isFigmaImageDataUrl(src)) {
              nodes.push({
                type: "image",
                name: safeLayerName(element.getAttribute("alt") || element.className || "html_image"),
                dataUrl: src,
                x: box.x,
                y: box.y,
                width: box.width,
                height: box.height,
                radius: scaleCssRadius(style.borderRadius, scaleX, scaleY)
              });
            }
            continue;
          }

          const background = extractSolidCssColor(style.backgroundColor);
          const gradient = parseCssGradient(readCssBackground(style));
          const borderColor = extractSolidCssColor(style.borderTopColor);
          const radius = scaleCssRadius(style.borderRadius, scaleX, scaleY);
          const hasShadow = style.boxShadow && style.boxShadow !== "none";
          const hasVisibleBox = background || gradient || (borderColor && Number.parseFloat(style.borderTopWidth) > 0) || hasShadow;
          if (hasVisibleBox && box.width >= 2 && box.height >= 2) {
            nodes.push({
              type: "rect",
              name: safeLayerName(element.className || element.id || "html_shape"),
              x: box.x,
              y: box.y,
              width: box.width,
              height: box.height,
              radius,
              fill: background || "#FFFFFF",
              gradient,
              opacity: clampNumber(Number(style.opacity), 0.05, 1, 1),
              stroke: borderColor && Number.parseFloat(style.borderTopWidth) > 0 ? borderColor : undefined,
              strokeWidth: Math.max(0, Math.round(Number.parseFloat(style.borderTopWidth || "0") * scaleX)),
              shadow: hasShadow ? parseCssBoxShadow(style.boxShadow, scaleY) : undefined
            });
          }

          const text = getDirectText(element);
          if (text) {
            nodes.push({
              type: "text",
              name: safeLayerName(element.className || element.id || "html_text"),
              text,
              x: box.x,
              y: box.y,
              width: box.width,
              height: box.height,
              fontSize: Math.max(8, Math.round(Number.parseFloat(style.fontSize || "16") * scaleY)),
              fontWeight: normalizeCssFontWeight(style.fontWeight),
              lineHeight: Math.max(10, Math.round(parseCssLineHeight(style, Number.parseFloat(style.fontSize || "16")) * scaleY)),
              color: extractSolidCssColor(style.color) || "#111318",
              opacity: clampNumber(Number(style.opacity), 0.05, 1, 1)
            });
          }
        }

        const sourceImage = getActiveResultImage()?.dataUrl
          ? {
              dataUrl: getActiveResultImage().dataUrl,
              name: "source_image_reference.png"
            }
          : null;
        return {
          version: "editable-design-experiment-0.3",
          metadata: {
            mode: "h5-dom-capture",
            source: "h5-preview",
            nodeCount: nodes.length,
            previewWidth: Math.round(screenRect.width),
            previewHeight: Math.round(screenRect.height)
          },
          screen: {
            name: "editable_design_h5_dom_capture",
            width: targetWidth,
            height: targetHeight,
            fill: screenFill,
            gradient: screenGradient,
            clipsContent: true
          },
          sourceImage,
          nodes: nodes.slice(0, 220)
        };
      }

      function getDirectText(element) {
        const text = [...element.childNodes]
          .filter((node) => node.nodeType === 3)
          .map((node) => node.textContent.replace(/\s+/g, " ").trim())
          .filter(Boolean)
          .join(" ")
          .trim();
        return text.length > 120 ? `${text.slice(0, 117)}...` : text;
      }

      function extractSolidCssColor(value) {
        const rgba = parseCssColor(value);
        if (!rgba || rgba.a <= 0.02) {
          return "";
        }
        return rgbToHex(rgba.r, rgba.g, rgba.b);
      }

      function parseCssColor(value) {
        const text = String(value || "").trim();
        if (!text || text === "transparent") {
          return null;
        }
        const rgba = text.match(/^rgba?\(([^)]+)\)$/i);
        if (rgba) {
          const parts = rgba[1].split(",").map((part) => part.trim());
          return {
            r: clampNumber(Number.parseFloat(parts[0]), 0, 255, 0),
            g: clampNumber(Number.parseFloat(parts[1]), 0, 255, 0),
            b: clampNumber(Number.parseFloat(parts[2]), 0, 255, 0),
            a: parts.length > 3 ? clampNumber(Number.parseFloat(parts[3]), 0, 1, 1) : 1
          };
        }
        if (/^#[0-9a-f]{3,8}$/i.test(text)) {
          let hex = text.slice(1);
          if (hex.length === 3 || hex.length === 4) {
            hex = hex.split("").map((char) => char + char).join("");
          }
          return {
            r: Number.parseInt(hex.slice(0, 2), 16),
            g: Number.parseInt(hex.slice(2, 4), 16),
            b: Number.parseInt(hex.slice(4, 6), 16),
            a: hex.length >= 8 ? Number.parseInt(hex.slice(6, 8), 16) / 255 : 1
          };
        }
        return null;
      }

      function parseCssGradient(value) {
        return parseCssLinearGradient(value) || parseCssRadialGradient(value);
      }

      function parseCssLinearGradient(value) {
        const text = extractCssFunction(value, "linear-gradient");
        if (!text) {
          return null;
        }
        const inner = text.replace(/^linear-gradient\(/i, "").replace(/\)\s*$/, "");
        const parts = splitCssFunctionArgs(inner);
        if (parts.length < 2) {
          return null;
        }
        let angle = 180;
        let colorParts = parts;
        const first = parts[0].trim().toLowerCase();
        if (first.endsWith("deg")) {
          angle = Number.parseFloat(first);
          colorParts = parts.slice(1);
        } else if (first.startsWith("to ")) {
          angle = cssGradientDirectionToAngle(first);
          colorParts = parts.slice(1);
        }
        const stops = colorParts
          .map((part, index) => parseCssGradientStop(part, index, colorParts.length))
          .filter(Boolean)
          .slice(0, 6);
        if (stops.length < 2) {
          return null;
        }
        return {
          type: "linear",
          angle,
          stops
        };
      }

      function parseCssRadialGradient(value) {
        const text = extractCssFunction(value, "radial-gradient");
        if (!text) {
          return null;
        }
        const inner = text.replace(/^radial-gradient\(/i, "").replace(/\)\s*$/, "");
        const parts = splitCssFunctionArgs(inner);
        if (parts.length < 2) {
          return null;
        }
        const colorParts = parts.filter((part) => /(rgba?\(|#[0-9a-f]{3,8})/i.test(part));
        const stops = colorParts
          .map((part, index) => parseCssGradientStop(part, index, colorParts.length))
          .filter(Boolean)
          .slice(0, 6);
        if (stops.length < 2) {
          return null;
        }
        return {
          type: "radial",
          stops
        };
      }

      function extractCssFunction(value, functionName) {
        const text = String(value || "");
        const lower = text.toLowerCase();
        const needle = `${functionName.toLowerCase()}(`;
        const start = lower.indexOf(needle);
        if (start < 0) {
          return "";
        }
        let depth = 0;
        for (let index = start; index < text.length; index += 1) {
          const character = text[index];
          if (character === "(") {
            depth += 1;
          } else if (character === ")") {
            depth -= 1;
            if (depth === 0) {
              return text.slice(start, index + 1);
            }
          }
        }
        return "";
      }

      function splitCssFunctionArgs(value) {
        const args = [];
        let current = "";
        let depth = 0;
        for (const character of String(value || "")) {
          if (character === "(") {
            depth += 1;
          } else if (character === ")") {
            depth = Math.max(0, depth - 1);
          }
          if (character === "," && depth === 0) {
            args.push(current.trim());
            current = "";
          } else {
            current += character;
          }
        }
        if (current.trim()) {
          args.push(current.trim());
        }
        return args;
      }

      function parseCssGradientStop(value, index, count) {
        const colorMatch = String(value || "").match(/(rgba?\([^)]+\)|#[0-9a-f]{3,8})/i);
        if (!colorMatch) {
          return null;
        }
        const color = parseCssColor(colorMatch[1]);
        if (!color) {
          return null;
        }
        const rest = String(value || "").replace(colorMatch[1], "").trim();
        const percent = rest.match(/(-?\d+(?:\.\d+)?)%/);
        const position = percent
          ? clampNumber(Number.parseFloat(percent[1]) / 100, 0, 1, index / Math.max(1, count - 1))
          : index / Math.max(1, count - 1);
        return {
          color: rgbToHex(color.r, color.g, color.b),
          opacity: clampNumber(color.a, 0, 1, 1),
          position
        };
      }

      function cssGradientDirectionToAngle(value) {
        const text = String(value || "").toLowerCase();
        if (text.includes("right")) return 90;
        if (text.includes("left")) return 270;
        if (text.includes("top")) return 0;
        return 180;
      }

      function scaleCssRadius(value, scaleX, scaleY) {
        const radius = Number.parseFloat(String(value || "0").split(" ")[0]);
        return Math.max(0, Math.round((Number.isFinite(radius) ? radius : 0) * Math.min(scaleX, scaleY)));
      }

      function parseCssBoxShadow(value, scaleY) {
        const numbers = String(value || "").match(/-?\d+(?:\.\d+)?px/g) || [];
        const color = parseCssColor((String(value || "").match(/rgba?\([^)]+\)/i) || [])[0]);
        return {
          y: Math.round((Number.parseFloat(numbers[1]) || 0) * scaleY),
          blur: Math.round((Number.parseFloat(numbers[2]) || 12) * scaleY),
          opacity: color ? Math.max(0.02, Math.min(0.35, color.a)) : 0.12
        };
      }

      function parseCssLineHeight(style, fontSize) {
        const value = style.lineHeight;
        if (!value || value === "normal") {
          return fontSize * 1.25;
        }
        if (value.endsWith("px")) {
          return Number.parseFloat(value) || fontSize * 1.25;
        }
        const numeric = Number.parseFloat(value);
        return Number.isFinite(numeric) ? numeric * fontSize : fontSize * 1.25;
      }

      function normalizeCssFontWeight(value) {
        if (value === "bold") {
          return 700;
        }
        if (value === "normal") {
          return 400;
        }
        return clampNumber(Number.parseInt(value, 10), 100, 900, 400);
      }

      function inferArrowIconFromText(value) {
        const text = String(value || "").replace(/\s+/g, "");
        if (!text || text.length > 3) {
          return "";
        }
        if (/^[›❯»>→➜➔]+$/.test(text)) {
          return "chevronright";
        }
        if (/^[‹❮«<←]+$/.test(text)) {
          return "chevronleft";
        }
        if (/^[⌄∨↓﹀]+$/.test(text)) {
          return "chevrondown";
        }
        if (/^[⌃∧↑︿]+$/.test(text)) {
          return "chevronup";
        }
        return "";
      }

      function safeLayerName(value) {
        const text = String(value || "layer")
          .replace(/\s+/g, "_")
          .replace(/[^\w\u4e00-\u9fa5-]/g, "_")
          .replace(/_+/g, "_")
          .replace(/^_+|_+$/g, "")
          .slice(0, 48);
        return text || "layer";
      }

      async function buildEditableDesignManifest() {
        const result = await requestEditableDesignReconstruction();
        if (!result.manifest) {
          throw new Error("后端没有返回可编辑设计稿 manifest");
        }
        if (result.warning) {
          setStatus(result.warning, true);
        } else if (result.mode === "model-manifest") {
          setStatus("已生成 AI 还原可编辑设计稿。");
        } else if (result.mode === "template") {
          setStatus("当前为可编辑稿模板占位，还不是图片真实还原。", true);
        }
        return result.manifest;
      }

      async function requestEditableDesignReconstruction() {
        const activeImage = getActiveResultImage();
        if (!activeImage?.dataUrl) {
          throw new Error("没有可还原的当前设计稿");
        }
        const referenceAssets = await collectEditableReferenceAssets(activeImage);

        const response = await fetch(`${PROXY_BASE_URL}/api/design/reconstruct-html`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            imageDataUrl: activeImage.dataUrl,
            sourceImageName: activeImage.id || `design-${activeResultIndex + 1}.png`,
            referenceAssets,
            prompt: promptInput.value.trim() || currentManifest.sourcePrompt || "",
            width: currentManifest.screen.width,
            height: currentManifest.screen.height,
            ratio: currentRatio,
            provider: activeProvider
          })
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(result.error || `Editable design request failed: ${response.status}`);
        }
        result.referenceAssets = referenceAssets;
        return result;
      }

      async function requestEditableDesignHtmlPreview() {
        const activeImage = getActiveResultImage();
        if (!activeImage?.dataUrl) {
          throw new Error("没有可预览的当前设计稿");

        const referenceAssets = await collectEditableReferenceAssets(activeImage);

      async function createRepairedPreviewImage(activeImage) {
        const assets = activeImage?.sliceManifest?.assets || [];
        if (!activeImage?.dataUrl || assets.length === 0) {
          return activeImage?.dataUrl || "";
        }
        const source = await loadImageElement(activeImage.dataUrl);
        const width = source.naturalWidth || source.width;
        const height = source.naturalHeight || source.height;
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const context = canvas.getContext("2d");
        context.drawImage(source, 0, 0);

        for (const asset of assets) {
          if (!asset.repairDataUrl) {
            Object.assign(asset, await createSliceRepairPatch(activeImage.dataUrl, asset.placement));
          }

          context.drawImage(
            repair,
            0,
            0,

            repair.naturalHeight || repair.height,
            asset.placement.x,
            asset.placement.y,
            asset.placement.width,
            asset.placement.height
          );

      function buildSliceExportManifest(activeImage, imageIndex) {
        const screen = currentManifest.screen;
        const assets = activeImage.sliceManifest.assets.map((asset, index) => {
          const filename = `assets/${sanitizeFilename(asset.name || `slice_${index + 1}`)}.png`;
          return {
            id: asset.id,
            name: asset.name,
            filename,
            svgFilename: asset.svgData ? filename.replace(/\.png$/, ".svg") : null,
            format: "png",
            formats: asset.svgData ? ["png", "svg"] : ["png"],
            transparent: Boolean(asset.transparent),
            aiTransparent: Boolean(asset.aiTransparent),
            aiRedrawn: Boolean(asset.aiRedrawn),
            hasOriginalRaster: Boolean(asset.originalDataUrl),
            selectedImageIndex: imageIndex,

          };
        });

          selectedImageIndex: imageIndex,
