            name: screen.name,
            width: screen.width,
            height: screen.height
          },
          assets
        };
      }

      function pointToScreenCoords(clientX, clientY, imageRect) {
        const screen = currentManifest.screen;
        const x = ((clientX - imageRect.left) / imageRect.width) * screen.width;
        const y = ((clientY - imageRect.top) / imageRect.height) * screen.height;
        return {
          x: clampNumber(Math.round(x), 0, screen.width, 0),
          y: clampNumber(Math.round(y), 0, screen.height, 0)
        };
      }

      function normalizeDraftRect(draft) {
        const screen = currentManifest.screen;
        const x1 = clampNumber(Math.min(draft.startX, draft.currentX), 0, screen.width, 0);
        const y1 = clampNumber(Math.min(draft.startY, draft.currentY), 0, screen.height, 0);
        const x2 = clampNumber(Math.max(draft.startX, draft.currentX), 0, screen.width, screen.width);
        const y2 = clampNumber(Math.max(draft.startY, draft.currentY), 0, screen.height, screen.height);
        return {
          x: Math.round(x1),
          y: Math.round(y1),
          width: Math.max(1, Math.round(x2 - x1)),
          height: Math.max(1, Math.round(y2 - y1))
        };
      }

      function isPointInsideRect(x, y, rect) {
        return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
      }

      function createPreviewPng(width, height, prompt, style, variant) {
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const context = canvas.getContext("2d");
        const scaleX = width / 390;
        const scaleY = height / 844;
        const scale = Math.min(scaleX, scaleY);

        context.fillStyle = "#10141f";
        context.fillRect(0, 0, width, height);

        const offset = variant * 8;
        drawRoundRect(context, 24 * scaleX, 52 * scaleY, 342 * scaleX, 220 * scaleY, 24 * scale, "#182335");
        drawRoundRect(context, 42 * scaleX, 82 * scaleY, 144 * scaleX, 18 * scaleY, 9 * scale, variant % 2 ? "#f2994a" : "#45d2bc");
        drawRoundRect(context, 42 * scaleX, 112 * scaleY, 112 * scaleX, 12 * scaleY, 6 * scale, "#e8f8f5");
        drawRoundRect(context, 42 * scaleX, 142 * scaleY, 130 * scaleX, 44 * scaleY, 20 * scale, "#f2c94c");

        context.fillStyle = variant % 2 ? "#f2c94c" : "#62d4c2";
        context.beginPath();
        context.arc((262 + offset) * scaleX, 154 * scaleY, 50 * scale, 0, Math.PI * 2);
        context.fill();
        context.fillStyle = "#f5f7fb";
        context.beginPath();
        context.arc((286 + offset) * scaleX, 126 * scaleY, 20 * scale, 0, Math.PI * 2);
        context.fill();

        drawRoundRect(context, 24 * scaleX, 300 * scaleY, 158 * scaleX, 132 * scaleY, 18 * scale, "#f5f7fb");
        drawRoundRect(context, 208 * scaleX, 300 * scaleY, 158 * scaleX, 132 * scaleY, 18 * scale, "#f5f7fb");
        drawRoundRect(context, 42 * scaleX, 324 * scaleY, 72 * scaleX, 12 * scaleY, 6 * scale, "#182335");
        drawRoundRect(context, 226 * scaleX, 324 * scaleY, 86 * scaleX, 12 * scaleY, 6 * scale, "#182335");
        drawRoundRect(context, 42 * scaleX, 354 * scaleY, 104 * scaleX, 44 * scaleY, 18 * scale, "#45d2bc");
        drawRoundRect(context, 226 * scaleX, 354 * scaleY, 104 * scaleX, 44 * scaleY, 18 * scale, "#f2994a");

        drawRoundRect(context, 24 * scaleX, 468 * scaleY, 342 * scaleX, 236 * scaleY, 22 * scale, "#182335");
        for (let index = 0; index < 4; index += 1) {
          drawRoundRect(context, 44 * scaleX, (496 + index * 46) * scaleY, 52 * scaleX, 30 * scaleY, 14 * scale, index % 2 ? "#f2994a" : "#45d2bc");
          drawRoundRect(context, 112 * scaleX, (502 + index * 46) * scaleY, 152 * scaleX, 10 * scaleY, 5 * scale, "#f5f7fb");
          drawRoundRect(context, 112 * scaleX, (520 + index * 46) * scaleY, 92 * scaleX, 8 * scaleY, 4 * scale, "#6f7a8a");
        }

        drawRoundRect(context, 24 * scaleX, 764 * scaleY, 342 * scaleX, 56 * scaleY, 22 * scale, "#f5f7fb");
        for (const x of [56, 144, 240, 332]) {
          context.fillStyle = "#182335";
          context.beginPath();
          context.arc(x * scaleX, 792 * scaleY, 12 * scale, 0, Math.PI * 2);
          context.fill();
        }

        context.font = `${Math.max(9, 11 * scale)}px Inter, system-ui, sans-serif`;
        context.fillStyle = "#9aa4b2";
        context.fillText((prompt || "").slice(0, 42), 24 * scaleX, 742 * scaleY);

        return canvas.toDataURL("image/png");
      }

      function buildDownloadFilename(index) {
        const paddedIndex = String(index + 1).padStart(2, "0");
        return `gpt-image-${paddedIndex}.png`;
      }

      async function prepareResultImages(images) {
        return Promise.all((images || []).map((image) => readResultImageMetadata(image)));
      }

      async function readResultImageMetadata(image) {
        if (!image?.dataUrl) {
          return image;
        }
        const source = await loadImageElement(image.dataUrl);
        return {
          ...image,
          naturalWidth: source.naturalWidth || source.width,
          naturalHeight: source.naturalHeight || source.height
        };
      }

      function createScreenFromResultImage(image, fallback) {
        const width = Math.round(image?.naturalWidth || fallback.width);
        const height = Math.round(image?.naturalHeight || fallback.height);
        return {
          name: fallback.name,
          width,
          height
        };
      }

      async function collectEditableReferenceAssets(activeImage) {
        const assets = (activeImage?.sliceManifest?.assets || [])
          .filter((asset) => asset.selected !== false && asset.dataUrl && asset.placement)
          .slice(0, 24);
        const normalized = [];
        for (const asset of assets) {
          let dataUrl = asset.dataUrl;
          try {
            dataUrl = await ensurePngOrJpegDataUrl(dataUrl);
          } catch (error) {
            console.warn("切图资产转 PNG 失败，已跳过", asset.id, error);
            continue;
          }
          if (!/^data:image\/(?:png|jpeg|jpg);base64,/i.test(dataUrl)) {
            continue;
          }
          normalized.push({
            id: asset.id,
            name: asset.name,
            kind: asset.kind,
            type: asset.type,
            dataUrl,
            radius: getSliceRadius(asset),
            placement: asset.placement
          });
        }
        return normalized;
      }

      async function ensurePngOrJpegDataUrl(dataUrl) {
        const value = String(dataUrl || "").trim();
        if (/^data:image\/(?:png|jpeg|jpg);base64,/i.test(value)) {
          return value;
        }
        const image = await loadImageElement(value);
        const canvas = document.createElement("canvas");
        canvas.width = Math.max(1, Math.round(image.naturalWidth || image.width || 1));
        canvas.height = Math.max(1, Math.round(image.naturalHeight || image.height || 1));
        const context = canvas.getContext("2d");
        if (!context) {
          throw new Error("无法创建图片转换画布");
        }
        context.clearRect(0, 0, canvas.width, canvas.height);
        context.drawImage(image, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL("image/png");
      }

      function loadImageElement(dataUrl) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error("结果图加载失败"));
          image.src = dataUrl;
        });
      }

      function isEmbeddedPluginHost() {
        return Boolean(window.parent && window.parent !== window);
      }

      function attachPreviewFit(image, frame) {
        if (!image || !frame) {
          return;
        }
        if (previewFrameObserver) {
          previewFrameObserver.disconnect();
          previewFrameObserver = null;
        }
        if (typeof ResizeObserver !== "undefined") {
          previewFrameObserver = new ResizeObserver(() => {
            schedulePreviewFit(image, frame);
          });
          previewFrameObserver.observe(frame);
        }
        if (image.complete) {
          schedulePreviewFit(image, frame);
        } else {
          image.addEventListener("load", () => schedulePreviewFit(image, frame), { once: true });
        }
      }

      function schedulePreviewFit(image, frame) {
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            applyPreviewFit(image, frame);
          });
        });
      }

      function applyPreviewFit(image, frame) {
        if (!image || !frame) {
          return;
        }
        const naturalWidth = image.naturalWidth;
        const naturalHeight = image.naturalHeight;
        const frameStyle = window.getComputedStyle(frame);
        const horizontalPadding = parseFloat(frameStyle.paddingLeft || "0") + parseFloat(frameStyle.paddingRight || "0");
        const availableWidth = frame.clientWidth - horizontalPadding;
        if (!naturalWidth || !naturalHeight || !availableWidth) {
          return;
        }
        const scale = Math.min(availableWidth / naturalWidth, 1.4);
        image.style.width = `${Math.floor(naturalWidth * scale)}px`;
        image.style.height = `${Math.floor(naturalHeight * scale)}px`;
        const card = image.closest(".result-card");
        const layer = card?.querySelector(".slice-layer");
        renderSliceOverlay(card, layer, image);
      }

      async function triggerImageDownload(dataUrl, filename) {
        if (!dataUrl) {
          setStatus("当前图片没有可下载的数据。", true);
          return;
        }
        try {
          const response = await fetch(dataUrl);
          const blob = await response.blob();
          triggerBlobDownload(blob, filename);
        } catch (error) {
          setStatus(`下载失败：${readErrorMessage(error)}`, true);
        }
      }

      function triggerBlobDownload(blob, filename) {
        const blobUrl = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = blobUrl;
        link.download = filename;
        link.rel = "noopener";
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
      }

      function textToUint8Array(text) {
        return new TextEncoder().encode(text);
      }

      function dataUrlToUint8Array(dataUrl) {
        const commaIndex = dataUrl.indexOf(",");
        if (commaIndex === -1) {
          throw new Error("Invalid data URL");
        }
        const base64 = dataUrl.slice(commaIndex + 1);
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index);
        }
        return bytes;
      }

      function createZipBlob(files) {
        const localParts = [];
        const centralParts = [];
        let offset = 0;
        files.forEach((file) => {
          const filename = textToUint8Array(file.name);
          const data = file.data;
          const crc = crc32(data);
          const localHeader = createZipLocalHeader(filename, data.length, crc);
          localParts.push(localHeader, data);
          centralParts.push(createZipCentralHeader(filename, data.length, crc, offset));
          offset += localHeader.length + data.length;
        });
        const centralSize = centralParts.reduce((sum, part) => sum + part.length, 0);
        const endRecord = createZipEndRecord(files.length, centralSize, offset);
        return new Blob([...localParts, ...centralParts, endRecord], { type: "application/zip" });
      }

      function createZipLocalHeader(filename, size, crc) {
        const header = new Uint8Array(30 + filename.length);
        const view = new DataView(header.buffer);
        view.setUint32(0, 0x04034b50, true);
        view.setUint16(4, 20, true);
        view.setUint16(6, 0, true);
        view.setUint16(8, 0, true);
        view.setUint16(10, getDosTime(), true);
        view.setUint16(12, getDosDate(), true);
        view.setUint32(14, crc, true);
        view.setUint32(18, size, true);
        view.setUint32(22, size, true);
        view.setUint16(26, filename.length, true);
        header.set(filename, 30);
        return header;
      }

      function createZipCentralHeader(filename, size, crc, offset) {
        const header = new Uint8Array(46 + filename.length);
        const view = new DataView(header.buffer);
        view.setUint32(0, 0x02014b50, true);
        view.setUint16(4, 20, true);
        view.setUint16(6, 20, true);
        view.setUint16(8, 0, true);
        view.setUint16(10, 0, true);
        view.setUint16(12, getDosTime(), true);
        view.setUint16(14, getDosDate(), true);
        view.setUint32(16, crc, true);
        view.setUint32(20, size, true);
        view.setUint32(24, size, true);
        view.setUint16(28, filename.length, true);
        view.setUint32(42, offset, true);
        header.set(filename, 46);
        return header;
      }

      function createZipEndRecord(fileCount, centralSize, centralOffset) {
        const record = new Uint8Array(22);
        const view = new DataView(record.buffer);
        view.setUint32(0, 0x06054b50, true);
        view.setUint16(8, fileCount, true);
        view.setUint16(10, fileCount, true);
        view.setUint32(12, centralSize, true);
        view.setUint32(16, centralOffset, true);
        return record;
      }

      function crc32(bytes) {
        let crc = 0xffffffff;
        for (let index = 0; index < bytes.length; index += 1) {
          crc = (crc >>> 8) ^ CRC32_TABLE[(crc ^ bytes[index]) & 0xff];
        }
        return (crc ^ 0xffffffff) >>> 0;
      }

      const CRC32_TABLE = (() => {
        const table = new Uint32Array(256);
        for (let index = 0; index < 256; index += 1) {
          let value = index;
          for (let bit = 0; bit < 8; bit += 1) {
            value = value & 1 ? 0xedb88320 ^ (value >>> 1) : value >>> 1;
          }
          table[index] = value >>> 0;
        }
        return table;
      })();

      function getDosTime() {
        const now = new Date();
        return (now.getHours() << 11) | (now.getMinutes() << 5) | Math.floor(now.getSeconds() / 2);
      }

      function getDosDate() {
        const now = new Date();
        return ((now.getFullYear() - 1980) << 9) | ((now.getMonth() + 1) << 5) | now.getDate();
      }

      function sanitizeFilename(value) {
        return String(value || "asset")
          .trim()
          .replace(/[\\/:*?"<>|]+/g, "_")
          .replace(/\s+/g, "_")
          .slice(0, 80) || "asset";
      }

      function createTransparentAssetPng(width, height, kind) {
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const context = canvas.getContext("2d");
        context.clearRect(0, 0, width, height);
        context.lineCap = "round";
        context.lineJoin = "round";

        if (kind === "illustration") {
          context.fillStyle = "#5dd6c6";
          context.beginPath();
          context.arc(width * 0.5, height * 0.48, width * 0.34, 0, Math.PI * 2);
          context.fill();
          context.fillStyle = "#f6f7fb";
          context.beginPath();
          context.arc(width * 0.58, height * 0.28, width * 0.12, 0, Math.PI * 2);
          context.fill();
          context.strokeStyle = "#17202a";
          context.lineWidth = 8;
          context.beginPath();
          context.moveTo(width * 0.54, height * 0.42);
          context.lineTo(width * 0.38, height * 0.58);
          context.lineTo(width * 0.28, height * 0.78);
          context.moveTo(width * 0.44, height * 0.54);
          context.lineTo(width * 0.66, height * 0.66);
          context.lineTo(width * 0.78, height * 0.82);
          context.stroke();
          return canvas.toDataURL("image/png");
        }

        context.strokeStyle = "#17202a";
        context.lineWidth = 7;
        if (kind === "home") {
          context.beginPath();
          context.moveTo(width * 0.2, height * 0.48);
          context.lineTo(width * 0.5, height * 0.22);
          context.lineTo(width * 0.8, height * 0.48);
          context.lineTo(width * 0.8, height * 0.78);
          context.lineTo(width * 0.28, height * 0.78);
          context.lineTo(width * 0.28, height * 0.48);
          context.stroke();
        } else if (kind === "bolt") {
          context.fillStyle = "#17202a";
          context.beginPath();
          context.moveTo(width * 0.55, height * 0.12);
          context.lineTo(width * 0.24, height * 0.54);
          context.lineTo(width * 0.48, height * 0.54);
          context.lineTo(width * 0.4, height * 0.88);
          context.lineTo(width * 0.76, height * 0.44);
          context.lineTo(width * 0.52, height * 0.44);
          context.closePath();
          context.fill();
        } else {
          context.beginPath();
          context.arc(width * 0.5, height * 0.34, width * 0.16, 0, Math.PI * 2);
          context.moveTo(width * 0.22, height * 0.82);
          context.quadraticCurveTo(width * 0.5, height * 0.56, width * 0.78, height * 0.82);
          context.stroke();
        }

        return canvas.toDataURL("image/png");
      }

      function applyRatio(ratio) {
        const presets = {
          "1:1": [1024, 1024],
          "16:9": [1920, 1080],
          "4:3": [1600, 1200],
          "3:4": [1200, 1600],
          "9:16": [390, 844]
        };
        if (presets[ratio]) {
          widthInput.value = presets[ratio][0];
          heightInput.value = presets[ratio][1];
        }
      }

      function updateCustomSizeVisibility() {
        customSizeCard.classList.toggle("hidden", currentRatio !== "custom");
        sidebar.classList.toggle("custom-mode", currentRatio === "custom");
      }

      function updateModeVisibility() {
        const isImageToImage = currentMode === "image-to-image";
        sidebar.classList.toggle("image-mode", isImageToImage);
        referenceSection.classList.toggle("hidden", !isImageToImage || referenceImages.length === 0);
        promptBox.classList.toggle("with-reference", isImageToImage);
        promptInput.placeholder = isImageToImage ? "粘贴参考图后，输入提示词..." : "描述你想生成的 UI App 界面";
        if (isImageToImage && referenceImages.length === 0) {
          setStatus("可以直接粘贴或拖拽多张参考图。");
        }
      }

      async function addReferenceImages(files) {
        const imageFiles = files.filter((file) => file && file.type && file.type.startsWith("image/")).slice(0, 16);
        if (imageFiles.length === 0) {
          setStatus("请粘贴或上传 PNG、JPG、WebP 图片。", true);
          return;
        }
        const nextImages = await Promise.all(
          imageFiles.map(async (file, index) => ({
            id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}-${index}`,
            name: file.name || `reference-${referenceImages.length + index + 1}.png`,
            type: file.type || "image/png",
            dataUrl: await fileToDataUrl(file)
          }))
        );
        referenceImages = [...referenceImages, ...nextImages].slice(0, 16);
        renderReferenceImages();
        setStatus(`已添加 ${referenceImages.length} 张参考图，可以继续输入描述词生成。`);
      }

      function removeReferenceImage(index) {
        referenceImages.splice(index, 1);
        renderReferenceImages();
      }

      function renderReferenceImages() {
        referenceSection.classList.toggle("hidden", currentMode !== "image-to-image" || referenceImages.length === 0);
        referenceDrop.classList.toggle("has-image", referenceImages.length > 0);
        referenceDrop.classList.toggle("empty", referenceImages.length === 0);
        const compactImages = referenceImages.slice(0, 4);
        const overflowCount = Math.max(referenceImages.length - compactImages.length, 0);
        referenceSection.classList.toggle("has-overflow", overflowCount > 0);
        referencePopover.hidden = overflowCount === 0;
        referenceChips.innerHTML = compactImages
          .map(
            (image, index) => `
              <span class="reference-chip">
                <img class="reference-preview" src="${image.dataUrl}" alt="${escapeHtml(image.name)}" />
                <span class="reference-info">
                  <strong>${escapeHtml(image.name)}</strong>
                </span>
                <button class="reference-clear" type="button" aria-label="移除 ${escapeHtml(image.name)}" data-remove-reference="${index}">×</button>
              </span>
            `
          )
          .join("");
        if (overflowCount > 0) {
          referenceChips.insertAdjacentHTML(
            "beforeend",
            `<span class="reference-chip more">+${overflowCount}</span>`
          );
        }
        referencePopoverGrid.innerHTML = referenceImages
          .map(
            (image, index) => `
              <span class="reference-chip">
                <img class="reference-preview" src="${image.dataUrl}" alt="${escapeHtml(image.name)}" />
                <span class="reference-info">
                  <strong>${escapeHtml(image.name)}</strong>
                </span>
                <button class="reference-clear" type="button" aria-label="移除 ${escapeHtml(image.name)}" data-remove-reference="${index}">×</button>
              </span>
            `
          )
          .join("");
        if (referenceImages.length === 0) {
          setStatus("可以直接粘贴或拖拽多张参考图。");
        }
      }

      function getImagesFromClipboard(clipboardData) {
        if (!clipboardData || !clipboardData.items) {
          return [];
        }
        const files = [];
        for (const item of clipboardData.items) {
          if (item.kind === "file" && item.type.startsWith("image/")) {
            const file = item.getAsFile();
            if (file) {
              files.push(file);
            }
          }
        }
        return files;
      }

      function syncProviderFieldsFromStorage() {
        const defaults = PROVIDER_DEFAULTS[activeProvider];
        providerBaseUrl = safeStorageGet(providerStorageKey(activeProvider, "base-url")) || defaults.baseUrl;
        providerBaseUrlInput.value = providerBaseUrl;
        apiModelInput.value = normalizeProviderModel(activeProvider, safeStorageGet(providerStorageKey(activeProvider, "model")) || defaults.model);
        apiKeyInput.value = "";
        apiKeyInput.placeholder = safeStorageGet(providerStorageKey(activeProvider, "has-key")) === "true" ? "已保存，已隐藏" : "sk-...";
        providerOptionButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.provider === activeProvider);
        });
      }

      async function switchProvider(provider) {
        if (!PROVIDER_DEFAULTS[provider]) {
          return;
        }
        activeProvider = provider;
        safeStorageSet("ai-ui-active-provider", activeProvider);
        syncProviderFieldsFromStorage();
        apiConfigStatus.textContent = `已切换到${PROVIDER_DEFAULTS[activeProvider].label}，保存配置后生效。`;
      }

      async function saveApiConfig() {
        providerBaseUrl = providerBaseUrlInput.value.trim().replace(/\/$/, "");
        const model = normalizeProviderModel(activeProvider, apiModelInput.value.trim());
        const apiKey = apiKeyInput.value.trim();
        safeStorageSet(providerStorageKey(activeProvider, "base-url"), providerBaseUrl);
        safeStorageSet(providerStorageKey(activeProvider, "model"), model);

        apiConfigStatus.textContent = "正在保存配置...";
        try {
          const response = await fetch(`${PROXY_BASE_URL}/api/config`, {
            method: "POST",
            headers: {
              "content-type": "application/json"
            },
            body: JSON.stringify({
              provider: activeProvider,
              baseUrl: providerBaseUrl,
              model,
              apiKey
            })
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(readErrorMessage(data, `保存失败：${response.status}`));
          }
          apiKeyInput.value = "";
          apiKeyInput.placeholder = data.hasApiKey ? "已保存，已隐藏" : "sk-...";
          safeStorageSet(providerStorageKey(activeProvider, "has-key"), data.hasApiKey ? "true" : "false");
          apiConfigStatus.textContent = data.hasApiKey ? `已保存：${PROVIDER_DEFAULTS[activeProvider].label} · ${data.baseUrl} · ${data.model}` : `已保存模型：${data.model}，但还没有 API Key`;
        } catch (error) {
          apiConfigStatus.textContent = `保存失败：${readNetworkErrorMessage(error)}`;
        }
      }

      async function loadApiConfigFromBackend() {
        try {
          const response = await fetch(`${PROXY_BASE_URL}/api/config`);
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(readErrorMessage(data, `加载配置失败：${response.status}`));
          }
          if (typeof data.activeProvider === "string" && PROVIDER_DEFAULTS[data.activeProvider]) {
            activeProvider = data.activeProvider;
            safeStorageSet("ai-ui-active-provider", activeProvider);
          }
          if (data.providers && typeof data.providers === "object") {
            Object.entries(data.providers).forEach(([provider, config]) => {
              if (!PROVIDER_DEFAULTS[provider] || !config) {
                return;
              }
              if (typeof config.baseUrl === "string" && config.baseUrl.trim()) {
                safeStorageSet(providerStorageKey(provider, "base-url"), config.baseUrl.trim());
              }
              if (typeof config.model === "string" && config.model.trim()) {
                safeStorageSet(providerStorageKey(provider, "model"), normalizeProviderModel(provider, config.model));
              }
              safeStorageSet(providerStorageKey(provider, "has-key"), config.hasApiKey ? "true" : "false");
            });
          }
          if (typeof data.baseUrl === "string" && data.baseUrl.trim()) {
            providerBaseUrl = data.baseUrl.trim();
            providerBaseUrlInput.value = providerBaseUrl;
            safeStorageSet(providerStorageKey(activeProvider, "base-url"), providerBaseUrl);
          }
          if (typeof data.model === "string" && data.model.trim()) {
            apiModelInput.value = normalizeProviderModel(activeProvider, data.model);
            safeStorageSet(providerStorageKey(activeProvider, "model"), apiModelInput.value);
          }
          safeStorageSet(providerStorageKey(activeProvider, "has-key"), data.hasApiKey ? "true" : "false");
          apiKeyInput.placeholder = data.hasApiKey ? "已保存，已隐藏" : "sk-...";
          syncProviderFieldsFromStorage();
        } catch (error) {
          console.warn("Failed to load API config from backend:", error);
        }
      }

      function normalizeProviderModel(provider, value) {
        if (provider === "openrouter") {
          return PROVIDER_DEFAULTS.openrouter.model;
        }
        return value && String(value).trim() ? String(value).trim() : PROVIDER_DEFAULTS[provider].model;
      }

      async function testApiConnection() {
        providerBaseUrl = providerBaseUrlInput.value.trim().replace(/\/$/, "");
        safeStorageSet(providerStorageKey(activeProvider, "base-url"), providerBaseUrl);
        apiConfigStatus.textContent = "正在测试连接...";
        try {
          const response = await fetch(`${PROXY_BASE_URL}/health`);
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(readErrorMessage(data, `连接失败：${response.status}`));
          }
          apiConfigStatus.textContent = data.hasApiKey ? `连接正常：${data.baseUrl} · ${data.model}` : `连接正常，但本地后端还没有保存 API Key`;
        } catch (error) {
          apiConfigStatus.textContent = `连接失败：${readNetworkErrorMessage(error)}`;
        }
      }

      async function clearApiConfig() {
        const defaults = PROVIDER_DEFAULTS[activeProvider];
        apiConfigStatus.textContent = "正在清空配置...";
        clearApiConfigButton.disabled = true;
        try {
          const response = await fetch(`${PROXY_BASE_URL}/api/config`, {
            method: "DELETE",
            headers: {
              "content-type": "application/json"
            },
            body: JSON.stringify({
              provider: activeProvider
            })
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(readErrorMessage(data, `清空失败：${response.status}`));
          }
          providerBaseUrl = data.baseUrl || defaults.baseUrl;
          safeStorageSet("ai-ui-active-provider", activeProvider);
          safeStorageRemove(providerStorageKey(activeProvider, "base-url"));
          safeStorageRemove(providerStorageKey(activeProvider, "model"));
          safeStorageSet(providerStorageKey(activeProvider, "has-key"), "false");
          providerBaseUrlInput.value = providerBaseUrl;
          apiModelInput.value = normalizeProviderModel(activeProvider, data.model || defaults.model);
          apiKeyInput.value = "";
          apiKeyInput.placeholder = "sk-...";
          apiConfigStatus.textContent = `已清空：${defaults.label} 已恢复默认配置`;
        } catch (error) {
          apiConfigStatus.textContent = `清空失败：${readNetworkErrorMessage(error)}`;
        } finally {
          clearApiConfigButton.disabled = false;
        }
      }

      function scalePlacement(base, screen) {
        const scaleX = screen.width / 390;
        const scaleY = screen.height / 844;
        return {
          x: Math.round(base.x * scaleX),
          y: Math.round(base.y * scaleY),
          width: Math.round(base.width * scaleX),
          height: Math.round(base.height * scaleY)
        };
      }

      function drawRoundRect(context, x, y, width, height, radius, color) {
        context.fillStyle = color;
        context.beginPath();
        context.roundRect(x, y, width, height, radius);
        context.fill();
      }

      function syncCharacterCount() {
        charCount.textContent = `${promptInput.value.length} / 1000`;
      }

      function setBusy(isBusy, message) {
        generateButton.disabled = isBusy;
        generateButton.textContent = isBusy ? "生成中..." : "生成设计稿";
        if (message) {
          setStatus(message);
        }
      }

      function setStatus(message, isError = false) {
        status.textContent = message;
        status.classList.toggle("error", isError);
      }

      function clampNumber(value, min, max, fallback) {
        if (!Number.isFinite(value)) {
          return fallback;
        }
        return Math.min(max, Math.max(min, value));
      }

      function readErrorMessage(value, fallback = "未知错误") {
        if (!value) {
          return fallback;
        }
        if (typeof value === "string") {
          return value;
        }
        if (value.message && typeof value.message === "string") {
          return value.message;
        }
        if (value.error && typeof value.error === "string") {
          return value.error;
        }
        if (value.error && value.error.message) {
          return value.error.message;
        }
        try {
          return JSON.stringify(value);
        } catch {
          return fallback;
        }
      }

      function readNetworkErrorMessage(error) {
        const message = readErrorMessage(error);
        if (/failed to fetch|networkerror|load failed/i.test(message)) {
          return "本地后端未启动或无法连接，请先运行 npm run api，再重新保存";
        }
        return message;
      }

      function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(reader.error || new Error("读取图片失败"));
          reader.readAsDataURL(file);
        });
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (character) => {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            "\"": "&quot;",
            "'": "&#039;"
          }[character];
        });
      }
    </script>
  </body>
</html>
