<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figma Plugin Simulator</title>
    <link rel="icon" href="data:," />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100dvh;
        overflow: hidden;
        background: #eef0f4;
        color: #23262f;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .sim {
        width: 100%;
        height: 100%;
      }

      .plugin-window {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <main class="sim">
      <section class="plugin-window" aria-label="插件窗口">
        <iframe src="./manual-slice.html?v=20260610-manual-slice" title="Manual Slice Workbench plugin"></iframe>
      </section>
    </main>

    <script>
      const pluginWindow = document.querySelector(".plugin-window");
      const pluginFrame = document.querySelector("iframe");
      const UI_WINDOW_STORAGE_KEY = "ai-ui-window-state-v2";

      restorePluginWindowState();

      window.addEventListener("message", (event) => {
        const message = event.data && event.data.pluginMessage;
        if (!message) {
          return;
        }

        if (message.type === "close") {
          return;
        }

        if (message.type === "resize-ui") {
          return;
        }

        if (message.type === "save-ui-window-state") {
          saveWindowState(message.state);
          return;
        }

        if (message.type === "set-ui-collapsed") {
          const state = readWindowState();
          const nextState = {
            width: state.width,
            height: state.height,
            collapsed: Boolean(message.collapsed)
          };
          saveWindowState(nextState);
          pluginFrame.contentWindow?.postMessage(
            {
              pluginMessage: {
                type: "ui-window-state",
                state: {
                  ...nextState,
                  width: window.innerWidth,
                  height: window.innerHeight
                }
              }
            },
            "*"
          );
          return;
        }
      });

      function restorePluginWindowState() {
        const state = readWindowState();
        pluginFrame.addEventListener("load", () => {
          pluginFrame.contentWindow?.postMessage(
            {
              pluginMessage: {
                type: "ui-window-state",
                state: {
                  ...state,
                  width: window.innerWidth,
                  height: window.innerHeight
                }
              }
            },
            "*"
          );
        });
      }

      function readWindowState() {
        try {
          const raw = window.localStorage.getItem(UI_WINDOW_STORAGE_KEY);
          const state = raw ? JSON.parse(raw) : null;
          if (state && typeof state === "object") {
            return {
              width: window.innerWidth,
              height: window.innerHeight,
              collapsed: Boolean(state.collapsed)
            };
          }
        } catch {
          // Ignore invalid simulator storage.
        }
        return { width: window.innerWidth, height: window.innerHeight, collapsed: false };
      }

      function saveWindowState(state) {
        if (!state || typeof state !== "object") {
          return;
        }
        const nextState = {
          width: window.innerWidth,
          height: window.innerHeight,
          collapsed: Boolean(state.collapsed)
        };
        window.localStorage.setItem(UI_WINDOW_STORAGE_KEY, JSON.stringify(nextState));
      }
    </script>
  </body>
</html>
