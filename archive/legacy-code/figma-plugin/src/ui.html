<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fa;
        --panel: #ffffff;
        --text: #111827;
        --body: #374151;
        --muted: #6b7280;
        --line: #e5e7eb;
        --accent: #2563eb;
        --accent-strong: #1d4ed8;
        --success: #15803d;
        --success-soft: #ecfdf5;
        --danger: #dc2626;
        --danger-soft: #fef2f2;
        --warning: #b45309;
        --warning-soft: #fffbeb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 420px;
        min-height: 560px;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font: 13px/1.45 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      }

      button {
        border: 0;
        font: inherit;
      }

      .app {
        display: flex;
        flex-direction: column;
        height: 560px;
      }

      .header {
        flex: none;
        padding: 16px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 11px;
      }

      .mark {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border-radius: 10px;
        background: #111827;
        color: #ffffff;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: 15px;
        line-height: 1.2;
      }

      .subtitle {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .content {
        display: flex;
        flex: 1;
        flex-direction: column;
        gap: 12px;
        min-height: 0;
        padding: 14px 16px;
      }

      .status-card,
      .warning-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .status-card {
        padding: 14px;
      }

      .status-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .status-dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: var(--muted);
      }

      .status-card[data-tone="normal"] .status-dot {
        background: var(--accent);
      }

      .status-card[data-tone="success"] {
        border-color: #bbf7d0;
        background: var(--success-soft);
      }

      .status-card[data-tone="success"] .status-dot {
        background: var(--success);
      }

      .status-card[data-tone="error"] {
        border-color: #fecaca;
        background: var(--danger-soft);
      }

      .status-card[data-tone="error"] .status-dot {
        background: var(--danger);
      }

      .status-title {
        margin: 0;
        font-weight: 650;
      }

      .status-detail {
        margin: 7px 0 0 19px;
        color: var(--body);
      }

      .warning-card {
        display: flex;
        min-height: 0;
        flex: 0 1 176px;
        flex-direction: column;
      }

      .upload-card {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .file-input {
        display: none;
      }

      .file-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .file-button {
        flex: none;
        min-height: 32px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #ffffff;
        color: var(--body);
        cursor: pointer;
        font-weight: 650;
      }

      .file-meta {
        min-width: 0;
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .warning-header {
        flex: none;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        color: var(--body);
        font-weight: 650;
      }

      .warning-list {
        flex: 1;
        min-height: 0;
        margin: 0;
        overflow: auto;
        padding: 8px 10px;
        list-style: none;
      }

      .warning-empty {
        color: var(--muted);
      }

      .warning-item {
        display: grid;
        gap: 4px;
        padding: 8px;
        border-radius: 6px;
        background: var(--warning-soft);
        color: var(--warning);
      }

      .warning-item + .warning-item {
        margin-top: 8px;
      }

      .warning-code {
        color: #78350f;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        font-weight: 700;
      }

      .actions {
        display: grid;
        flex: none;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 0 16px 16px;
      }

      .button {
        display: inline-flex;
        min-height: 36px;
        align-items: center;
        justify-content: center;
        border-radius: 7px;
        cursor: pointer;
        font-weight: 650;
      }

      .button:disabled {
        cursor: not-allowed;
        opacity: 0.62;
      }

      .button-primary {
        background: var(--accent);
        color: #ffffff;
      }

      .button-primary:not(:disabled):hover {
        background: var(--accent-strong);
      }

      .button-secondary {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--body);
      }

      .button-wide {
        grid-column: 1 / -1;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div class="brand">
          <div class="mark">IF</div>
          <div>
            <h1>Image-to-Figma Design</h1>
            <p class="subtitle">Upload one PNG and generate an editable Figma draft.</p>
          </div>
        </div>
      </header>

      <section class="content">
        <section id="statusCard" class="status-card" data-tone="normal">
          <div class="status-row">
            <span class="status-dot"></span>
            <p id="statusTitle" class="status-title">Ready</p>
          </div>
          <p id="statusDetail" class="status-detail">Choose a PNG to start, or use Sample for a renderer smoke test.</p>
        </section>

        <section class="upload-card">
          <input id="fileInput" class="file-input" type="file" accept="image/png,.png" />
          <div class="file-row">
            <button id="chooseFileButton" class="file-button" type="button">Choose PNG</button>
            <div id="fileMeta" class="file-meta">No file selected.</div>
          </div>
        </section>

        <section class="upload-card" style="margin-top:8px">
          <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Import from Slice Studio</div>
          <div class="file-row" style="gap:6px">
            <input id="dslUrlInput" type="text" placeholder="http://127.0.0.1:4110/api/projects/…/pages/…/figma-dsl"
              style="flex:1;font:inherit;font-size:11px;padding:5px 8px;border:1px solid var(--line);border-radius:6px;outline:none;color:var(--text);background:var(--bg)" />
            <button id="importDslButton" class="button button-primary" type="button" style="white-space:nowrap">Import</button>
          </div>
        </section>

        <section class="warning-card">
          <div id="warningHeader" class="warning-header">Warnings</div>
          <ul id="warningList" class="warning-list">
            <li class="warning-empty">No warnings yet.</li>
          </ul>
        </section>
      </section>

      <footer class="actions">
        <button id="renderButton" class="button button-primary button-wide" type="button" disabled>Generate Draft</button>
        <button id="sampleButton" class="button button-secondary button-dev" type="button">Sample</button>
        <button id="closeButton" class="button button-secondary" type="button">Close</button>
      </footer>
    </main>

    <script>
      const renderButton = document.getElementById("renderButton");
      const sampleButton = document.getElementById("sampleButton");
      const closeButton = document.getElementById("closeButton");
      const fileInput = document.getElementById("fileInput");
      const chooseFileButton = document.getElementById("chooseFileButton");
      const fileMeta = document.getElementById("fileMeta");
      const statusCard = document.getElementById("statusCard");
      const statusTitle = document.getElementById("statusTitle");
      const statusDetail = document.getElementById("statusDetail");
      const warningHeader = document.getElementById("warningHeader");
      const warningList = document.getElementById("warningList");
      let selectedFile = null;

      chooseFileButton.addEventListener("click", () => {
        fileInput.click();
      });

      fileInput.addEventListener("change", () => {
        const file = fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;
        if (!file) {
          selectedFile = null;
          fileMeta.textContent = "No file selected.";
          updateButtons(false);
          return;
        }
        if (file.type !== "image/png" && !file.name.toLowerCase().endsWith(".png")) {
          selectedFile = null;
          fileMeta.textContent = "Choose a PNG file.";
          updateButtons(false);
          setStatus("Failed", "Only PNG files are supported.", "error");
          return;
        }
        selectedFile = file;
        fileMeta.textContent = `${file.name} / ${formatBytes(file.size)}`;
        updateButtons(false);
        setStatus("Ready", "PNG selected. Generate when ready.", "normal");
      });

      renderButton.addEventListener("click", async () => {
        if (!selectedFile) {
          setStatus("Failed", "Choose a PNG file first.", "error");
          return;
        }
        updateButtons(true);
        setStatus("Uploading", "Uploading PNG.", "normal");
        setWarnings([]);
        try {
          const bytes = await selectedFile.arrayBuffer();
          postPluginMessage({
            type: "render-uploaded-png-draft",
            fileName: selectedFile.name,
            mimeType: "image/png",
            bytes
          });
        } catch (error) {
          updateButtons(false);
          setStatus("Failed", error instanceof Error ? error.message : "Could not read PNG file.", "error");
        }
      });

      sampleButton.addEventListener("click", () => {
        updateButtons(true);
        setStatus("Rendering", "Writing the bundled sample to Figma.", "normal");
        setWarnings([]);
        postPluginMessage({ type: "render-sample" });
      });

      const dslUrlInput = document.getElementById("dslUrlInput");
      const importDslButton = document.getElementById("importDslButton");
      importDslButton.addEventListener("click", () => {
        const url = dslUrlInput.value.trim();
        if (!url) { setStatus("Failed", "Enter a DSL endpoint URL.", "error"); return; }
        updateButtons(true);
        setStatus("Importing", "Fetching DSL from Slice Studio.", "normal");
        setWarnings([]);
        postPluginMessage({ type: "render-slice-studio-dsl", dslUrl: url });
      });

      closeButton.addEventListener("click", () => {
        postPluginMessage({ type: "cancel" });
      });

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message || typeof message.type !== "string") {
          return;
        }

        if (message.type === "plugin-state") {
          return;
        }

        if (message.type === "render-started") {
          updateButtons(true);
          if (message.source === "draft") {
            setStatus("Uploading", "Uploading PNG.", "normal");
          } else {
            setStatus("Rendering", "Writing the bundled sample to Figma.", "normal");
          }
          return;
        }

        if (message.type === "render-succeeded") {
          updateButtons(false);
          const diagnostics = diagnosticsSummary(message.diagnostics);
          const detail = diagnostics
            ? `${message.renderedElementCount} elements rendered. ${message.warningCount} warnings. ${diagnostics}.`
            : `${message.renderedElementCount} elements rendered. ${message.warningCount} warnings.`;
          setStatus(
            "Rendered",
            detail,
            "success"
          );
          setWarnings(message.warnings || []);
          return;
        }

        if (message.type === "render-failed") {
          updateButtons(false);
          setStatus("Failed", message.message || "Rendering failed.", "error");
          setWarnings([...(message.errors || []), ...(message.warnings || [])]);
          return;
        }

        if (message.type === "status") {
          setStatus(statusTitleFor(message), message.message, message.tone);
        }
      };

      postPluginMessage({ type: "request-plugin-state" });

      function postPluginMessage(message) {
        parent.postMessage({ pluginMessage: message }, "*");
      }

      function setStatus(title, detail, tone) {
        statusCard.dataset.tone = tone || "normal";
        statusTitle.textContent = title;
        statusDetail.textContent = detail || "";
      }

      function setWarnings(warnings) {
        const items = Array.isArray(warnings) ? warnings : [];
        warningHeader.textContent = `Warnings (${items.length})`;
        warningList.textContent = "";

        if (items.length === 0) {
          const empty = document.createElement("li");
          empty.className = "warning-empty";
          empty.textContent = "No warnings.";
          warningList.appendChild(empty);
          return;
        }

        for (const warning of items) {
          const item = document.createElement("li");
          item.className = "warning-item";

          const code = document.createElement("span");
          code.className = "warning-code";
          code.textContent = warning.elementId ? `${warning.code} / ${warning.elementId}` : warning.code;

          const message = document.createElement("span");
          message.textContent = warning.message || "No detail.";

          item.append(code, message);
          warningList.appendChild(item);
        }
      }

      function diagnosticsSummary(diagnostics) {
        if (!diagnostics || typeof diagnostics !== "object") {
          return "";
        }
        const parts = [];
        if (diagnostics.ocrProvider) {
          parts.push(`OCR ${diagnostics.ocrProvider} ${diagnostics.ocrCacheHit ? "cache hit" : "fresh"}`);
        }
        if (typeof diagnostics.ocrTextCount === "number") {
          parts.push(`text ${diagnostics.ocrTextCount}`);
        }
        if (
          typeof diagnostics.textLayerCount === "number" ||
          typeof diagnostics.rasterLayerCount === "number" ||
          typeof diagnostics.shapeLayerCount === "number"
        ) {
          parts.push(
            `layers T${diagnostics.textLayerCount || 0}/R${diagnostics.rasterLayerCount || 0}/S${diagnostics.shapeLayerCount || 0}`
          );
        }
        if (typeof diagnostics.missingAssetCount === "number") {
          parts.push(`missing assets ${diagnostics.missingAssetCount}`);
        }
        return parts.join(", ");
      }

      function updateButtons(isBusy) {
        renderButton.disabled = isBusy || !selectedFile;
        sampleButton.disabled = isBusy;
        chooseFileButton.disabled = isBusy;
      }

      function formatBytes(size) {
        if (size < 1024) {
          return `${size} B`;
        }
        if (size < 1024 * 1024) {
          return `${Math.round(size / 1024)} KB`;
        }
        return `${(size / (1024 * 1024)).toFixed(1)} MB`;
      }

      function statusTitleFor(message) {
        if (message.tone === "error") {
          return "Failed";
        }
        if (message.message === "Uploading PNG.") {
          return "Uploading";
        }
        if (
          message.message === "Processing uploaded PNG." ||
          message.message === "Fetching generated design." ||
          message.message === "Fetching M29 plan-driven design." ||
          message.message === "Running Draft layer pipeline." ||
          message.message === "Fetching Draft Runtime design."
        ) {
          return "Processing";
        }
        if (message.message === "Writing design to Figma.") {
          return "Writing to Figma";
        }
        if (message.message === "Writing sample design to Figma.") {
          return "Rendering";
        }
        return "Status";
      }
    </script>
  </body>
</html>
