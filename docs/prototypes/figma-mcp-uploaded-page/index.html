    <style>
      :root {
        color-scheme: light;
        --page-width: 853px;
        --page-height: 1844px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #e9eaee;
        font-family:
          Inter,
          "Noto Sans SC",
          "Noto Sans JP",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .viewport {
        display: grid;
        min-height: 100vh;
        place-items: start center;
        padding: 24px;
      }

      .page {
        position: relative;
        width: var(--page-width);
        height: var(--page-height);
        overflow: hidden;
        background: #f7f8fa;
        box-shadow: 0 18px 60px rgb(0 0 0 / 18%);
        transform-origin: top center;
      }

      .layer,
      .image-layer,
      .text-layer,
      .group-layer {
        position: absolute;
      }

      .image-layer img {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        max-width: none;
        pointer-events: none;
      }

      .cover img {
        object-fit: cover;
      }

      .contain img {
        object-fit: contain;
      }

      .text-layer,
      .group-layer p {
        margin: 0;
        font-style: normal;
        font-weight: 400;
        line-height: normal;
        white-space: nowrap;
        word-break: break-word;
      }

      .group-layer {
        overflow: hidden;
        font-weight: 400;
        line-height: normal;
        white-space: nowrap;
        word-break: break-word;
      }

      .group-layer p {
        position: absolute;
      }

      @media (max-width: 901px) {
        .viewport {
          padding: 0;
        }

        .page {
          box-shadow: none;
          transform: scale(calc(100vw / 853));
        }
      }
    </style>
